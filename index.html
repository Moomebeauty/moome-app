<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="沐蜜美學"/>
<title>沐蜜美學秘境</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:#fdf8fc;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;background:rgba(255,255,255,.92);border-bottom:1px solid #f0e8f4;box-shadow:0 2px 12px rgba(244,165,176,.1);flex-shrink:0;z-index:10}
.logo-title{font-size:19px;font-weight:900;color:#3d2440;letter-spacing:1px}
.logo-sub{font-size:11px;color:#c4a0b0}
.pill{background:#f4a5b0;color:#fff;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700}
nav{display:flex;background:rgba(255,255,255,.95);border-bottom:1px solid #f0e8f4;flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;border:none;background:transparent;cursor:pointer;color:#bbb;font-family:inherit;font-size:11px}
.nav-btn.active{color:#c4547a;border-bottom:3px solid #f4a5b0;font-weight:700}
.nav-icon{font-size:19px}
main{flex:1;overflow-y:auto;padding:14px 14px 40px}
.card{background:rgba(255,255,255,.93);border-radius:14px;padding:16px;box-shadow:0 3px 16px rgba(180,100,130,.07);border:1px solid #f5eef8;margin-bottom:12px}
.card-title{font-size:13px;font-weight:800;color:#3d2440;margin-bottom:10px;letter-spacing:.5px}
.btn{border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;padding:12px 20px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,#f4a5b0,#e87a95);color:#fff;box-shadow:0 3px 12px rgba(244,165,176,.4)}
.btn-s{background:linear-gradient(135deg,#a5c4f4,#7aa8e8);color:#fff;box-shadow:0 3px 12px rgba(165,196,244,.35)}
.btn-g{background:#f5f0f8;color:#7a5a7a;border:1.5px solid #e8d8f0}
.btn-red{background:#fff5f5;color:#e74c3c;border:1.5px solid #ffcdd2}
.btn-green{background:#f0faf5;color:#3a9e72;border:1.5px solid #b8e8d4}
.btn-blue{background:#f0f4ff;color:#4a6fa5;border:1.5px solid #c8d8f4}
.btn-purple{background:#f5f0ff;color:#7a5aa5;border:1.5px solid #d8c8f4}
.btn-orange{background:#fff8f0;color:#c4547a;border:1.5px solid #f4a5b0}
.input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #f0e8f4;font-size:15px;outline:none;background:#fff;color:#3d2440;font-family:inherit}
.select{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #f0e8f4;font-size:15px;outline:none;background:#fff;color:#3d2440;font-family:inherit;cursor:pointer}
.row-item{display:flex;align-items:center;gap:11px;padding:12px;background:#fafafa;border-radius:10px;border:1px solid #f0eef4;margin-bottom:8px;cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tag{padding:7px 13px;border-radius:18px;border:1.5px solid #f0e8f4;background:#fff;color:#7a5a7a;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;margin:0 4px 6px 0}
.tag.on{background:#f4a5b0;color:#fff;border-color:#f4a5b0}
.fb{padding:9px 18px;border-radius:18px;border:1.5px solid #f0e8f4;background:#fff;color:#7a5a7a;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
.fb.on{background:#f4a5b0;color:#fff;border-color:#f4a5b0}
.empty{text-align:center;color:#ccc;padding:36px 0;font-size:15px}
.back-btn{background:transparent;border:none;color:#f4a5b0;font-size:15px;cursor:pointer;font-weight:700;padding:7px 0;font-family:inherit}
.sig-overlay{position:fixed;inset:0;background:rgba(30,10,40,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.sig-modal{background:#fff;border-radius:20px;padding:22px;width:min(95vw,950px);box-shadow:0 20px 80px rgba(0,0,0,.25)}
.sig-canvas{width:100%;border-radius:11px;border:2px solid #f0e8f4;background:#fff;display:block;touch-action:none}
.toast-el{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 24px;border-radius:36px;font-size:15px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.15);z-index:300;white-space:nowrap;pointer-events:none;display:none}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat-card{flex:1;min-width:110px;text-align:center;border-radius:13px;padding:12px 6px;background:#fff;border:1px solid #f5eef8;box-shadow:0 2px 10px rgba(180,100,130,.06)}
.alert-box{display:flex;gap:10px;align-items:flex-start;background:#fff5f0;border:1.5px solid #ffd0c0;border-radius:12px;padding:11px 14px;margin-bottom:12px}
.ic{background:#fafafa;border-radius:9px;padding:9px 13px}
.ic-l{font-size:11px;color:#bbb;margin-bottom:2px}
.ic-v{font-weight:700;font-size:14px;color:#3d2440}
.no-sig{background:#fff8f0;border:1.5px dashed #f4a5b0;border-radius:11px;padding:14px;text-align:center;margin-top:10px}
.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:9px;padding:9px 13px;font-size:12px;color:#b8860b;margin-bottom:10px}
.confirm-box{background:#fff5f5;border:1.5px solid #ffcdd2;border-radius:11px;padding:14px;text-align:center;margin-top:10px}
.sep-line{border:none;border-top:1px solid #f0e8f4;margin:10px 0}
.cash-tag{background:#e8f8f0;color:#2e7d52;border:1.5px solid #b8e8d0;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-el" id="toast-el"></div>
<input type="file" id="import-input" accept=".json" style="display:none">

<script>
// ── Constants ──
const PLANS=[
  {label:"儲 19,800 元",value:19800,bonus:2200,total:22000},
  {label:"儲 36,800 元",value:36800,bonus:9200,total:46000},
  {label:"自訂金額",value:0,bonus:0,total:0,custom:true}
];
const SERVICES=["基礎淨白","舒顏SPA","訂製安瓶","水光藻針","外泌體","私密處除毛","腋下除毛","體態精修"];
const LOW=3000;
const SHEETS="https://script.google.com/macros/s/AKfycbxHKMd4hvAskNWG2YhclsValR7KT0s8dSjfiK-QYInn1Ky8O1GG9Eqb4moDwRPY_3MCGg/exec";

// ── Utils ──
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=n=>Number(n||0).toLocaleString("zh-TW");
const todayStr=()=>new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
const todayISO=()=>new Date().toISOString().slice(0,10);
const isoToDisp=iso=>{if(!iso)return"";const[y,m,d]=iso.split("-");return`${y}/${m}/${d}`;};
const timeStr=iso=>{const t=new Date().toLocaleTimeString("zh-TW",{hour12:false,hour:"2-digit",minute:"2-digit"});return`${isoToDisp(iso)} ${t}`;};
const timeToISO=s=>{if(!s)return todayISO();const m=s.match(/(\d{4})\/(\d{2})\/(\d{2})/);return m?`${m[1]}-${m[2]}-${m[3]}`:todayISO();};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const ce=(tag,cls,html="")=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;};
const ap=(p,...cs)=>{cs.forEach(c=>{if(c)p.appendChild(c);});return p;};

// ── Data ──
let customers=ld("mmC",[]),records=ld("mmR",[]);
const saveAll=()=>{sv("mmC",customers);sv("mmR",records);};

// ── Toast ──
let toastTimer=null;
function toast(msg,type="ok"){
  const el=document.getElementById("toast-el");
  el.textContent=msg;el.style.background=type==="warn"?"#e67e22":"#6cc5a0";el.style.display="block";
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display="none";},3000);
}

// ── Avatar ──
function mkAvatar(c,sz=52){
  if(c.photo){const i=ce("img");i.src=c.photo;i.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0`;return i;}
  const cols=["#f4a5b0","#a5c4f4","#a5f4c4","#f4d0a5","#c4a5f4"];
  const bg=cols[(c.name?.charCodeAt(0)||0)%cols.length];
  const d=ce("div");d.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${sz*.4}px;font-weight:700;color:#fff;flex-shrink:0`;
  d.textContent=c.name?.slice(0,1)||"?";return d;
}

// ── Signature ──
function openSig(cb){
  const overlay=ce("div","sig-overlay");
  const modal=ce("div","sig-modal");
  const hdr=ce("div","",`<span style="font-size:19px;font-weight:900;color:#3d2440">✍️ 請簽名確認</span><span style="font-size:12px;color:#aaa;float:right">Apple Pencil 或手指</span>`);
  hdr.style.marginBottom="14px";
  const wrap=ce("div");wrap.style.cssText="position:relative;margin-bottom:14px";
  const canvas=ce("canvas","sig-canvas");canvas.width=900;canvas.height=340;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,340);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lp=null;
  const gp=e=>{const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(900/r.width),y:(s.clientY-r.top)*(340/r.height)};};
  canvas.onpointerdown=e=>{e.preventDefault();drawing=true;lp=gp(e);};
  canvas.onpointermove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.stroke();lp=p;};
  canvas.onpointerup=canvas.onpointerleave=e=>{e.preventDefault();drawing=false;};
  const sigLine=ce("div");sigLine.style.cssText="position:absolute;bottom:48px;left:5%;right:5%;height:1.5px;background:#f0d0dc;pointer-events:none";
  const sigLbl=ce("div");sigLbl.style.cssText="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:11px;color:#e0c0cc;letter-spacing:2px";sigLbl.textContent="簽名於此";
  ap(wrap,canvas,sigLine,sigLbl);
  const acts=ce("div");acts.style.cssText="display:flex;gap:8px;justify-content:flex-end";
  const bClr=ce("button","btn btn-g");bClr.textContent="清除";bClr.onclick=()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,900,340);};
  const bCan=ce("button","btn btn-g");bCan.textContent="取消";bCan.style.color="#888";bCan.onclick=()=>overlay.remove();
  const bOk=ce("button","btn btn-p");bOk.textContent="確認簽名";bOk.onclick=()=>{overlay.remove();cb(canvas.toDataURL("image/png"));};
  ap(acts,bClr,bCan,bOk);ap(modal,hdr,wrap,acts);overlay.appendChild(modal);document.body.appendChild(overlay);
}

// ── addRecord ──
function addRecord(rec){
  openSig(sig=>{
    const full={...rec,id:uid(),signature:sig,time:timeStr(rec.date)};
    records.unshift(full);
    if(rec.type==="topup"){customers=customers.map(c=>c.id===rec.cid?{...c,balance:(c.balance||0)+rec.total}:c);}
    else{customers=customers.map(c=>c.id===rec.cid?{...c,balance:(c.balance||0)-rec.amount}:c);}
    saveAll();
    toast(rec.type==="topup"?"✅ 儲值完成":"✅ 消費扣款完成");
    goTab(currentTab);
  });
}

// ── Export / Import ──
function doExport(){
  const data=JSON.stringify({customers,records,at:new Date().toLocaleString("zh-TW")},null,2);
  const a=ce("a");a.href=URL.createObjectURL(new Blob([data],{type:"application/json"}));
  a.download=`沐蜜備份_${todayStr().replace(/\//g,"-")}.json`;a.click();
  toast("📤 備份已下載（含所有資料與簽名）");
}
document.getElementById("import-input").onchange=function(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.customers||!d.records)return toast("❌ 格式錯誤","warn");
      if(!confirm(`確定還原資料？\n顧客 ${d.customers.length} 位，紀錄 ${d.records.length} 筆\n⚠️ 目前資料將被覆蓋`))return;
      customers=d.customers;records=d.records;saveAll();
      toast(`✅ 還原完成！顧客 ${d.customers.length} 位`);goTab("home");
    }catch{toast("❌ 無法讀取備份","warn");}
  };r.readAsText(file);this.value="";
};
async function doSheets(btn){
  btn.disabled=true;btn.textContent="⏳ 備份中...";
  try{
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"customers",rows:customers.map(c=>[c.name,c.phone||"",c.balance||0,c.createdAt||""])})});
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"records",rows:records.map(r=>[r.time,r.customerName,r.type==="topup"?"儲值":"消費",r.type==="topup"?r.total:r.amount,r.service||r.plan||"",r.note||"",r.cash||""])})});
    btn.textContent="✅ 成功";btn.style.background="#6cc5a0";btn.style.color="#fff";
    setTimeout(()=>{btn.textContent="☁️ 備份到 Google Sheets";btn.style.cssText="";btn.disabled=false;},3000);
  }catch{btn.textContent="❌ 失敗";btn.disabled=false;}
}

// ═══════════════════════════════
// ── TAB: HOME ──
// ═══════════════════════════════
function renderHome(){
  const wrap=ce("div");
  const totalTopup=records.filter(r=>r.type==="topup").reduce((s,r)=>s+(r.total||0),0);
  const totalCharge=records.filter(r=>r.type==="charge").reduce((s,r)=>s+(r.amount||0),0);
  const totalCash=records.filter(r=>r.cash).reduce((s,r)=>s+(Number(r.cash)||0),0);
  const totalBal=customers.reduce((s,c)=>s+(c.balance||0),0);
  const low=customers.filter(c=>(c.balance||0)<LOW&&(c.balance||0)>0);

  // Stats
  const sr=ce("div","stat-row");
  [["💰","總儲值","$"+fmt(totalTopup),"#f4a5b0"],
   ["✂️","總消費","$"+fmt(totalCharge),"#a5c4f4"],
   ["💵","收現金額","$"+fmt(totalCash),"#a5e8c4"],
   ["🏦","總餘額","$"+fmt(totalBal),"#a5f4c4"],
   ["👥","顧客數",customers.length+" 位","#f4d0a5"]
  ].forEach(([icon,lbl,val,color])=>{
    const sc=ce("div","stat-card");sc.style.borderTop=`4px solid ${color}`;
    sc.innerHTML=`<div style="font-size:22px;margin-bottom:3px">${icon}</div><div style="font-size:10px;color:#aaa;margin-bottom:3px">${lbl}</div><div style="font-size:15px;font-weight:800">${val}</div>`;
    sr.appendChild(sc);
  });
  wrap.appendChild(sr);

  // Low balance
  if(low.length>0){
    const ab=ce("div","alert-box");
    ab.innerHTML=`<span style="font-size:20px">⚠️</span><div><div style="font-weight:700;color:#c0392b;font-size:13px;margin-bottom:2px">低餘額提醒</div><div style="font-size:12px;color:#666">${low.map(c=>`${c.name}（$${fmt(c.balance)}）`).join("、")}</div></div>`;
    wrap.appendChild(ab);
  }

  // Grid: recent + buttons
  const grid=ce("div");grid.style.cssText="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start";
  const recCard=ce("div","card");
  const rt=ce("div","card-title");rt.textContent="最近紀錄";recCard.appendChild(rt);
  const recent=records.slice(0,6);
  if(!recent.length){const e=ce("div","empty");e.textContent="尚無紀錄";recCard.appendChild(e);}
  recent.forEach(r=>{
    const row=ce("div");row.style.cssText="display:flex;gap:9px;align-items:center;padding:9px 0;border-bottom:1px solid #f5f0f8";
    row.innerHTML=`<span style="font-size:17px">${r.type==="topup"?"💳":"✂️"}</span><div style="flex:1"><div style="font-weight:600;font-size:14px">${r.customerName}</div><div style="font-size:11px;color:#aaa">${r.time}</div></div><div style="text-align:right"><div style="font-weight:700;font-size:14px;color:${r.type==="topup"?"#6cc5a0":"#f4a5b0"}">${r.type==="topup"?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div>${r.cash?`<div class="cash-tag">現 $${fmt(r.cash)}</div>`:""}</div>`;
    recCard.appendChild(row);
  });
  grid.appendChild(recCard);

  const btns=ce("div");btns.style.cssText="display:flex;flex-direction:column;gap:9px";
  const mk=(cls,txt,fn)=>{const b=ce("button","btn "+cls);b.textContent=txt;b.onclick=fn;return b;};
  const bSheets=ce("button","btn btn-green");bSheets.style.fontSize="13px";bSheets.textContent="☁️ 備份到 Google Sheets";bSheets.onclick=()=>doSheets(bSheets);
  const sep=ce("hr","sep-line");
  const sepLbl=ce("div");sepLbl.style.cssText="font-size:11px;color:#bbb;text-align:center;font-weight:600";sepLbl.textContent="完整備份（含簽名）";
  const bExp=ce("button","btn btn-blue");bExp.style.fontSize="13px";bExp.textContent="📤 匯出備份";bExp.onclick=doExport;
  const bImp=ce("button","btn btn-purple");bImp.style.fontSize="13px";bImp.textContent="📥 匯入還原";bImp.onclick=()=>document.getElementById("import-input").click();
  ap(btns,
    mk("btn-p","💳 儲值",()=>goTab("topup")),
    mk("btn-s","✂️ 消費扣款",()=>goTab("charge")),
    mk("btn-g","👥 顧客管理",()=>goTab("customers")),
    bSheets,sep,sepLbl,bExp,bImp
  );
  grid.appendChild(btns);
  wrap.appendChild(grid);
  return wrap;
}

// ═══════════════════════════════
// ── TAB: CUSTOMERS ──
// ═══════════════════════════════
let cMode="list",cSel=null,cSearch="",cRecTab="all",cDelConfirm=false;
function renderCustomers(){
  const wrap=ce("div");
  if(cMode==="add"){
    const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{cMode="list";goTab("customers");};
    const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:12px;margin-bottom:20px";
    const t=ce("span");t.style.cssText="font-size:19px;font-weight:800;color:#3d2440";t.textContent="新增顧客";
    ap(hdr,back,t);wrap.appendChild(hdr);
    let photoVal="";
    const pWrap=ce("div");pWrap.style.cssText="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:14px";
    const pCircle=ce("div");pCircle.style.cssText="width:84px;height:84px;border-radius:50%;background:#fdf0f5;border:2.5px dashed #f4a5b0;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;font-size:26px";pCircle.textContent="📷";
    const pInput=ce("input");pInput.type="file";pInput.accept="image/*";pInput.style.display="none";
    pInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{photoVal=ev.target.result;pCircle.innerHTML=`<img src="${photoVal}" style="width:100%;height:100%;object-fit:cover">`;};r.readAsDataURL(f);};
    pCircle.onclick=()=>pInput.click();
    const pLbl=ce("span");pLbl.style.cssText="font-size:11px;color:#bbb";pLbl.textContent="點擊上傳照片";
    ap(pWrap,pCircle,pLbl,pInput);wrap.appendChild(pWrap);
    const nameIn=ce("input","input");nameIn.placeholder="顧客姓名 *";nameIn.style.marginBottom="10px";
    const phoneIn=ce("input","input");phoneIn.placeholder="手機號碼";phoneIn.style.marginBottom="14px";
    const subBtn=ce("button","btn btn-p");subBtn.style.cssText="width:100%;font-size:17px;padding:16px";subBtn.textContent="確認新增";
    subBtn.onclick=()=>{
      if(!nameIn.value.trim())return toast("請輸入顧客姓名","warn");
      customers.unshift({id:uid(),balance:0,createdAt:todayStr(),name:nameIn.value.trim(),phone:phoneIn.value.trim(),photo:photoVal});
      saveAll();cMode="list";toast("✅ 顧客新增完成");goTab("customers");
    };

let tCid="",tPlan=null,tCustom="",tNote="",tDate=todayISO();

  // Right

  PLANS.forEach(p=>{
    const pb=ce("button");pb.style.cssText=`display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-radius:9px;border:${tPlan===p?"2px solid #f4a5b0":"1.5px solid #f0e8f4"};background:${tPlan===p?"#fff0f4":"#fff"};cursor:pointer;font-family:inherit;width:100%;margin-bottom:7px`;
    const pl=ce("div");pl.innerHTML=`<div style="font-weight:700;font-size:14px;color:${tPlan===p?"#c4547a":"#333"}">${p.label}</div>${!p.custom?`<div style="font-size:11px;color:#aaa;margin-top:1px">入帳 $${fmt(p.total)} 元</div>`:""}`;
    pb.appendChild(pl);
    if(!p.custom){const badge=ce("span");badge.style.cssText="background:#f4a5b0;color:#fff;padding:2px 9px;border-radius:18px;font-size:11px;white-space:nowrap";badge.textContent="贈 $"+fmt(p.bonus);pb.appendChild(badge);}
    pb.onclick=()=>{tPlan=p;goTab("topup");};rc.appendChild(pb);
  });
  if(tPlan?.custom){const ci2=ce("input","input");ci2.type="number";ci2.placeholder="輸入儲值金額";ci2.value=tCustom;ci2.oninput=e=>{tCustom=e.target.value;};rc.appendChild(ci2);}
  grid.appendChild(rc);wrap.appendChild(grid);
  const amount=tPlan?.custom?Number(tCustom)||0:tPlan?.value||0;
  const total=tPlan?.custom?amount:(tPlan?.total||0);
  const bonus=tPlan?.custom?0:(tPlan?.bonus||0);
  if(tPlan&&amount>0){
    const sc=ce("div","card");sc.style.background="linear-gradient(135deg,#fdf0f5,#f9f0ff)";sc.style.marginTop="12px";
    const sh=ce("div");sh.style.cssText="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px";
    const sl=ce("div");sl.innerHTML=`<div style="font-size:12px;color:#aaa">本次入帳</div><div style="font-size:30px;font-weight:900;color:#6cc5a0">+$${fmt(total)}</div>${bonus>0?`<div style="font-size:12px;color:#f4a5b0">（付 $${fmt(amount)} + 贈 $${fmt(bonus)}）</div>`:""}`;
    sh.appendChild(sl);
    if(cust){const sr2=ce("div");sr2.style.textAlign="right";sr2.innerHTML=`<div style="font-size:12px;color:#aaa">儲值後餘額</div><div style="font-size:22px;font-weight:800">$${fmt((cust.balance||0)+total)}</div>`;sh.appendChild(sr2);}
    sc.appendChild(sh);
    const ni=ce("input","input");ni.placeholder="備註（選填）";ni.value=tNote;ni.oninput=e=>{tNote=e.target.value;};ni.style.marginBottom="8px";
    sc.appendChild(ni);
    const sb=ce("button","btn btn-p");sb.style.cssText="width:100%;font-size:17px;padding:15px";sb.textContent="💳 確認儲值，前往簽名";sb.disabled=!cust;
    sb.onclick=()=>{if(!cust)return;addRecord({type:"topup",cid:cust.id,customerId:cust.id,customerName:cust.name,amount,bonus,total,plan:tPlan?.label||"自訂",note:tNote,date:tDate});tPlan=null;tCustom="";tNote="";tCid="";tDate=todayISO();};
    sc.appendChild(sb);wrap.appendChild(sc);
  }
  return wrap;
}

let chCid="",chSvc="",chAmt="",chNote="",chDate=todayISO(),chCash="";
function renderCharge(){
  const wrap=ce("div");
  const grid=ce("div","g2");

  const dlbl=ce("div");dlbl.style.cssText="font-size:12px;color:#aaa;margin:12px 0 5px";dlbl.textContent="📅 交易日期";
  const din=ce("input","input");din.type="date";din.value=chDate;din.onchange=e=>{chDate=e.target.value;};ap(lc,dlbl,din);grid.appendChild(lc);
  const rc=ce("div","card");const rt2=ce("div","card-title");rt2.textContent="服務 / 購買項目";rc.appendChild(rt2);
  const tw=ce("div");tw.style.cssText="display:flex;flex-wrap:wrap;margin-bottom:10px";
  SERVICES.forEach(sv=>{const tb=ce("button","tag"+(chSvc===sv?" on":""));tb.textContent=sv;tb.onclick=()=>{chSvc=sv;goTab("charge");};tw.appendChild(tb);});rc.appendChild(tw);
  const si=ce("input","input");si.placeholder="自行輸入服務或購買產品項目";si.value=chSvc;si.oninput=e=>{chSvc=e.target.value;};rc.appendChild(si);
  grid.appendChild(rc);wrap.appendChild(grid);

  const au=ce("div");au.style.cssText="font-size:22px;color:#ddd";au.textContent="元";ap(ar,ai,au);amtCard.appendChild(ar);
  const amt=Number(chAmt)||0;

    const afterBal=(cust.balance||0)-amt;
    const bb=ce("div");bb.style.cssText=`margin-top:10px;padding:10px;background:${afterBal<0?"#fff0f0":"#f0fff6"};border-radius:9px`;
    if(afterBal<0){bb.innerHTML=`<div style="color:#e74c3c;font-weight:700">⚠️ 餘額不足！差 $${fmt(Math.abs(afterBal))}</div>`;}
    else{bb.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="color:#aaa;font-size:12px">扣款後餘額</div><div style="font-size:24px;font-weight:900;color:${afterBal<LOW?"#e67e22":"#6cc5a0"}">$${fmt(afterBal)}</div>${afterBal<LOW?'<div style="color:#e67e22;font-size:11px">⚠️ 即將不足</div>':""}</div><div style="font-size:28px">${afterBal<LOW?"⚠️":"✅"}</div></div>`;}

function renderRecordDetail(det,wrap){
  const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{rSel=null;goTab("records");};
  const editBtn=ce("button","btn btn-g");editBtn.style.cssText="font-size:13px;padding:8px 16px;margin-left:auto";editBtn.textContent="✏️ 修改";editBtn.onclick=()=>{rEditing=!rEditing;goTab("records");};
  const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:9px;margin-bottom:13px";
  const ht=ce("span");ht.style.cssText="font-size:17px;font-weight:800;color:#3d2440;flex:1";ht.textContent="紀錄詳情";
  ap(hdr,back,ht);if(!rEditing)hdr.appendChild(editBtn);wrap.appendChild(hdr);
  const card=ce("div","card");card.style.maxWidth="640px";
  card.innerHTML=`<div style="display:flex;gap:11px;align-items:center;margin-bottom:14px"><span style="font-size:28px">${det.type==="topup"?"💳":"✂️"}</span><div style="flex:1"><div style="font-weight:800;font-size:17px">${det.customerName}</div><div style="color:#aaa;font-size:12px">${det.time}</div></div><div style="font-weight:900;font-size:20px;color:${det.type==="topup"?"#6cc5a0":"#f4a5b0"}">${det.type==="topup"?"+$"+fmt(det.total):"-$"+fmt(det.amount)}</div></div>`;
  if(rEditing){
    const wb=ce("div","warn-box");wb.textContent="⚠️ 金額無法修改（需刪除後重建）。可修改日期、服務項目、收現金額、備註。";card.appendChild(wb);
    const dlbl=ce("div");dlbl.style.cssText="font-size:12px;color:#aaa;margin-bottom:5px";dlbl.textContent="📅 交易日期";
    const din=ce("input","input");din.type="date";din.value=timeToISO(det.time);card.appendChild(dlbl);card.appendChild(din);
    let editSvc=det.service||"";
    if(det.type==="charge"){
      const sl=ce("div");sl.style.cssText="font-size:12px;color:#aaa;margin:10px 0 5px";sl.textContent="服務項目";card.appendChild(sl);
      const tw=ce("div");tw.style.cssText="display:flex;flex-wrap:wrap;margin-bottom:8px";
      SERVICES.forEach(sv=>{const tb=ce("button","tag"+(editSvc===sv?" on":""));tb.textContent=sv;tb.onclick=()=>{editSvc=sv;svcIn.value=sv;tw.querySelectorAll(".tag").forEach(b=>b.classList.remove("on"));tb.classList.add("on");};tw.appendChild(tb);});
      card.appendChild(tw);
      const svcIn=ce("input","input");svcIn.value=editSvc;svcIn.placeholder="自行輸入";card.appendChild(svcIn);
      const cl=ce("div");cl.style.cssText="font-size:12px;color:#2e7d52;font-weight:700;margin:10px 0 5px";cl.textContent="💵 實際收現金額";
      const ci=ce("input","input");ci.type="number";ci.value=det.cash||"";ci.style.borderColor="#b8e8d0";
      const nl=ce("div");nl.style.cssText="font-size:12px;color:#aaa;margin:10px 0 5px";nl.textContent="備註";
      const ni=ce("input","input");ni.value=det.note||"";
      ap(card,cl,ci,nl,ni);
      const ar=ce("div");ar.style.cssText="display:flex;gap:8px;margin-top:12px";
      const cn=ce("button","btn btn-g");cn.style.flex="1";cn.textContent="取消";cn.onclick=()=>{rEditing=false;goTab("records");};
      const sv2=ce("button","btn btn-p");sv2.style.flex="2";sv2.textContent="✅ 儲存修改";
      sv2.onclick=()=>{const updated={...det,service:svcIn.value||editSvc,cash:ci.value?Number(ci.value):null,note:ni.value,date:din.value,time:timeStr(din.value)};records=records.map(r=>r.id===updated.id?updated:r);saveAll();rEditing=false;toast("✅ 紀錄已更新");goTab("records");};
      ap(ar,cn,sv2);card.appendChild(ar);
    } else {
      const pl=ce("div");pl.style.cssText="font-size:12px;color:#aaa;margin:10px 0 5px";pl.textContent="方案名稱";
      const pi=ce("input","input");pi.value=det.plan||"";
      const nl=ce("div");nl.style.cssText="font-size:12px;color:#aaa;margin:10px 0 5px";nl.textContent="備註";
      const ni=ce("input","input");ni.value=det.note||"";
      ap(card,pl,pi,nl,ni);
      const ar=ce("div");ar.style.cssText="display:flex;gap:8px;margin-top:12px";
      const cn=ce("button","btn btn-g");cn.style.flex="1";cn.textContent="取消";cn.onclick=()=>{rEditing=false;goTab("records");};
      const sv2=ce("button","btn btn-p");sv2.style.flex="2";sv2.textContent="✅ 儲存修改";
      sv2.onclick=()=>{const updated={...det,plan:pi.value,note:ni.value,date:din.value,time:timeStr(din.value)};records=records.map(r=>r.id===updated.id?updated:r);saveAll();rEditing=false;toast("✅ 紀錄已更新");goTab("records");};
      ap(ar,cn,sv2);card.appendChild(ar);
    }
  } else {
    // Info grid
    const ig=ce("div");ig.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px";
    const ic2=(l,v)=>{const d=ce("div","ic");d.innerHTML=`<div class="ic-l">${l}</div><div class="ic-v">${v}</div>`;return d;};
    ig.appendChild(ic2("類型",det.type==="topup"?"儲值":"消費扣款"));
    if(det.type==="topup"){ap(ig,ic2("入帳金額","$"+fmt(det.total)),ic2("方案",det.plan));if(det.bonus>0)ig.appendChild(ic2("贈點","$"+fmt(det.bonus)));}
    else{ap(ig,ic2("服務項目",det.service),ic2("消費金額","$"+fmt(det.amount)),ic2("扣款前餘額","$"+fmt(det.beforeBalance)),ic2("扣款後餘額","$"+fmt(det.afterBalance)));if(det.cash)ig.appendChild(ic2("💵 收現金額","$"+fmt(det.cash)));}
    if(det.note)ig.appendChild(ic2("備註",det.note));
    card.appendChild(ig);
    // Signature
    if(det.signature){
      const sd=ce("div");sd.style.marginBottom="12px";
      const sl=ce("div");sl.style.cssText="font-weight:700;color:#aaa;font-size:12px;margin-bottom:7px";sl.textContent="✍️ 顧客簽名存證";
      const si2=ce("img");si2.src=det.signature;si2.style.cssText="width:100%;border-radius:9px;border:1.5px solid #eee";
      ap(sd,sl,si2);card.appendChild(sd);
    } else {
      const ns=ce("div","no-sig");
      ns.innerHTML=`<div style="font-size:13px;color:#c4547a;font-weight:700;margin-bottom:6px">⚠️ 尚未簽名</div><div style="font-size:12px;color:#aaa;margin-bottom:10px">可補簽名</div>`;
      const sb2=ce("button","btn btn-p");sb2.style.cssText="font-size:14px;padding:10px 24px";sb2.textContent="✍️ 補簽名";
      sb2.onclick=()=>openSig(sig=>{records=records.map(r=>r.id===det.id?{...r,signature:sig}:r);saveAll();toast("✅ 簽名已補存");goTab("records");});
      ns.appendChild(sb2);card.appendChild(ns);
    }
    // Delete
    if(rDelConfirm){
      const cb=ce("div","confirm-box");
      cb.innerHTML=`<div style="font-weight:700;color:#c0392b;margin-bottom:6px">確定要刪除此筆紀錄？</div><div style="font-size:12px;color:#888;margin-bottom:10px">${det.type==="charge"?"✅ 將自動把 $"+fmt(det.amount)+" 還回顧客餘額":"⚠️ 將自動從顧客餘額扣除 $"+fmt(det.total)}</div>`;
      const ca=ce("div");ca.style.cssText="display:flex;gap:8px;justify-content:center";
      const cNo=ce("button","btn btn-g");cNo.textContent="取消";cNo.onclick=()=>{rDelConfirm=false;goTab("records");};
      const cYes=ce("button","btn");cYes.style.cssText="background:#e74c3c;color:#fff";cYes.textContent="確認刪除";
      cYes.onclick=()=>{
        if(det.type==="charge")customers=customers.map(c=>(c.id===det.cid||c.id===det.customerId)?{...c,balance:(c.balance||0)+det.amount}:c);
        else customers=customers.map(c=>(c.id===det.cid||c.id===det.customerId)?{...c,balance:Math.max(0,(c.balance||0)-det.total)}:c);
        records=records.filter(r=>r.id!==det.id);saveAll();
        rSel=null;rDelConfirm=false;toast("🗑️ 紀錄已刪除，餘額已還原");goTab("records");
      };
      ap(ca,cNo,cYes);cb.appendChild(ca);card.appendChild(cb);
    } else {
      const db=ce("button","btn btn-red");db.style.cssText="width:100%;margin-top:10px";db.textContent="🗑️ 刪除此筆紀錄";db.onclick=()=>{rDelConfirm=true;goTab("records");};card.appendChild(db);
    }
  }
  wrap.appendChild(card);return wrap;
}

// ═══════════════════════════════
// ── RENDER ──
// ═══════════════════════════════
let currentTab="home";
function goTab(tab){currentTab=tab;renderAll();}

function renderAll(){
  const root=document.getElementById("root");
  root.innerHTML="";
  // Header
  const hdr=ce("header");
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:11px"><span style="font-size:30px">🌸</span><div><div class="logo-title">沐蜜美學秘境</div><div class="logo-sub">顧客儲值管理系統</div></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><div class="pill">顧客 ${customers.length} 位</div><div style="font-size:11px;color:#bbb">${todayStr()}</div></div>`;
  root.appendChild(hdr);
  // Nav
  const nav=ce("nav");
  [["home","🏠","首頁"],["customers","👥","顧客"],["topup","💳","儲值"],["charge","✂️","消費"],["records","📋","紀錄"]].forEach(([key,icon,label])=>{
    const btn=ce("button","nav-btn"+(currentTab===key?" active":""));
    btn.innerHTML=`<span class="nav-icon">${icon}</span><span>${label}</span>`;
    btn.onclick=()=>goTab(key);nav.appendChild(btn);
  });
  root.appendChild(nav);
  // Main
  const main=ce("main");
  if(currentTab==="home")main.appendChild(renderHome());
  else if(currentTab==="customers")main.appendChild(renderCustomers());
  else if(currentTab==="topup")main.appendChild(renderTopup());
  else if(currentTab==="charge")main.appendChild(renderCharge());
  else if(currentTab==="records")main.appendChild(renderRecords());
  root.appendChild(main);
}

renderAll();
</script>
