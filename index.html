<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="沐蜜美學"/>
<title>沐蜜美學秘境</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:#fdf8fc;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
.app{height:100vh;display:flex;flex-direction:column;position:relative}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(255,255,255,.9);border-bottom:1px solid #f0e8f4;box-shadow:0 2px 16px rgba(244,165,176,.1);flex-shrink:0;z-index:10}
.logo-title{font-size:20px;font-weight:900;color:#3d2440;letter-spacing:1px}
.logo-sub{font-size:11px;color:#c4a0b0}
.pill{background:#f4a5b0;color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700}
.nav{display:flex;background:rgba(255,255,255,.95);border-bottom:1px solid #f0e8f4;flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border:none;background:transparent;cursor:pointer;color:#bbb;font-family:inherit}
.nav-btn.active{color:#c4547a;border-bottom:3px solid #f4a5b0}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:11px}
.main{flex:1;overflow-y:auto;padding:16px 16px 32px}
.card{background:rgba(255,255,255,.92);border-radius:16px;padding:18px;box-shadow:0 4px 20px rgba(180,100,130,.08);border:1px solid #f5eef8;margin-bottom:14px}
.card-title{font-size:14px;font-weight:800;color:#3d2440;margin-bottom:12px}
.btn{border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;padding:13px 22px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#f4a5b0,#e87a95);color:#fff;box-shadow:0 4px 14px rgba(244,165,176,.4)}
.btn-secondary{background:linear-gradient(135deg,#a5c4f4,#7aa8e8);color:#fff;box-shadow:0 4px 14px rgba(165,196,244,.4)}
.btn-ghost{background:#f5f0f8;color:#7a5a7a;border:1.5px solid #e8d8f0}
.btn-danger{background:#fff5f5;color:#e74c3c;border:1.5px solid #ffcdd2}
.btn-green{background:#f0faf5;color:#3a9e72;border:1.5px solid #b8e8d4}
.btn-blue{background:#f0f4ff;color:#4a6fa5;border:1.5px solid #c8d8f4}
.btn-purple{background:#f5f0ff;color:#7a5aa5;border:1.5px solid #d8c8f4}
.btn:disabled{opacity:.5;cursor:not-allowed}
.input{width:100%;padding:13px 15px;border-radius:11px;border:1.5px solid #f0e8f4;font-size:16px;outline:none;background:#fff;color:#3d2440;font-family:inherit}
.select{width:100%;padding:13px 15px;border-radius:11px;border:1.5px solid #f0e8f4;font-size:16px;outline:none;background:#fff;color:#3d2440;font-family:inherit;cursor:pointer}
.row{display:flex;align-items:center;gap:12px;padding:12px;background:#fafafa;border-radius:10px;border:1px solid #f0eef4;cursor:pointer;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tag-btn{padding:8px 14px;border-radius:20px;border:1.5px solid #f0e8f4;background:#fff;color:#7a5a7a;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600}
.tag-btn.active{background:#f4a5b0;color:#fff;border-color:#f4a5b0}
.filter-btn{padding:10px 20px;border-radius:20px;border:1.5px solid #f0e8f4;background:#fff;color:#7a5a7a;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600}
.filter-btn.active{background:#f4a5b0;color:#fff;border-color:#f4a5b0}
.empty{text-align:center;color:#ccc;padding:40px 0;font-size:16px}
.back-btn{background:transparent;border:none;color:#f4a5b0;font-size:16px;cursor:pointer;font-weight:700;padding:8px 0;font-family:inherit}
.sig-overlay{position:fixed;inset:0;background:rgba(40,20,50,.55);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.sig-modal{background:#fff;border-radius:22px;padding:24px;width:min(94vw,960px);box-shadow:0 20px 80px rgba(0,0,0,.25)}
.sig-canvas{width:100%;border-radius:12px;border:2px solid #f0e8f4;background:#fff;display:block;touch-action:none;cursor:crosshair}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);color:#fff;padding:13px 26px;border-radius:40px;font-size:16px;font-weight:700;box-shadow:0 8px 28px rgba(0,0,0,.15);z-index:200;white-space:nowrap;pointer-events:none}
.avatar{border-radius:50%;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.info-cell{background:#fafafa;border-radius:10px;padding:10px 14px}
.info-cell-label{font-size:12px;color:#bbb;margin-bottom:2px}
.info-cell-value{font-weight:700;font-size:15px}
.stat-card{flex:1;text-align:center;border-radius:16px;padding:14px;background:rgba(255,255,255,.92);border:1px solid #f5eef8;min-width:120px}
.alert{display:flex;gap:12px;align-items:center;background:#fff5f0;border:1.5px solid #ffd0c0;border-radius:14px;padding:12px 16px;margin-bottom:14px}
.no-sig-box{background:#fff8f0;border:1.5px dashed #f4a5b0;border-radius:12px;padding:16px;text-align:center;margin-top:12px}
.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:10px 14px;font-size:13px;color:#b8860b;margin-bottom:12px}
.confirm-box{background:#fff5f5;border:1.5px solid #ffcdd2;border-radius:12px;padding:16px;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Data ──
const PLANS=[{label:"儲 19,800 元",value:19800,bonus:2200,total:22000},{label:"儲 36,800 元",value:36800,bonus:9200,total:46000},{label:"自訂金額",value:0,bonus:0,total:0,custom:true}];
const SERVICES=["基礎淨白","舒顏SPA","訂製安瓶","水光藻針","外泌體","私密處除毛","腋下除毛","體態精修"];
const LOW_BALANCE=3000;
const SHEETS_URL="https://script.google.com/macros/s/AKfycbxHKMd4hvAskNWG2YhclsValR7KT0s8dSjfiK-QYInn1Ky8O1GG9Eqb4moDwRPY_3MCGg/exec";

// ── Utils ──
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>Number(n).toLocaleString("zh-TW");
const todayStr=()=>new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>{if(!iso)return"";const[y,m,d]=iso.split("-");return`${y}/${m}/${d}`;};
const nowWithDate=iso=>{const t=new Date().toLocaleTimeString("zh-TW",{hour12:false,hour:"2-digit",minute:"2-digit"});return`${fmtDate(iso)} ${t}`;};
const timeToISO=t=>{if(!t)return todayISO();const m=t.match(/(\d{4})\/(\d{2})\/(\d{2})/);return m?`${m[1]}-${m[2]}-${m[3]}`:todayISO();};
const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const el=(tag,cls,attrs={})=>{const e=document.createElement(tag);if(cls)e.className=cls;Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else e[k]=v;});return e;};
const h=(tag,props={},children=[])=>{const e=el(tag,props.className||"",props);delete e.className;if(props.className)e.className=props.className;children.forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;};

// ── State ──
let state={customers:load("mmcustomers",[]),records:load("mmrecords",[]),tab:"home",sig:null,toast:null,toastTimer:null};
const setState=(patch)=>{Object.assign(state,typeof patch==="function"?patch(state):patch);render();};
const setCustomers=fn=>{state.customers=typeof fn==="function"?fn(state.customers):fn;sv("mmcustomers",state.customers);};
const setRecords=fn=>{state.records=typeof fn==="function"?fn(state.records):fn;sv("mmrecords",state.records);};

function showToast(msg,type="success"){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  state.toast={msg,type};
  state.toastTimer=setTimeout(()=>{state.toast=null;renderToast();},3000);
  renderToast();
}

function renderToast(){
  let t=document.getElementById("toast-el");
  if(!t){t=document.createElement("div");t.id="toast-el";document.body.appendChild(t);}
  if(state.toast){t.className="toast";t.style.background=state.toast.type==="warn"?"#ff9966":"#6cc5a0";t.textContent=state.toast.msg;t.style.display="block";}
  else{t.style.display="none";}
}

// ── Avatar ──
function makeAvatar(customer,size=56){
  if(customer.photo){const img=el("img","avatar");img.src=customer.photo;img.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0`;return img;}
  const colors=["#f4a5b0","#a5c4f4","#a5f4c4","#f4d0a5","#c4a5f4"];
  const bg=colors[(customer.name?.charCodeAt(0)||0)%colors.length];
  const d=el("div","avatar");d.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${size*.4}px;font-weight:700;color:#fff;flex-shrink:0`;
  d.textContent=customer.name?.slice(0,1)||"?";return d;
}

// ── Signature ──
let sigDrawing=false,sigLastPt=null;
function openSig(onSave,onCancel){
  const overlay=el("div","sig-overlay");overlay.id="sig-overlay";
  const modal=el("div","sig-modal");
  const hdr=el("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}});
  const title=el("span","");title.style.cssText="font-size:20px;font-weight:900;color:#3d2440";title.textContent="✍️ 請簽名確認";
  const hint=el("span","");hint.style.cssText="font-size:13px;color:#aaa";hint.textContent="Apple Pencil 或手指";
  hdr.appendChild(title);hdr.appendChild(hint);
  const wrap=el("div","",{style:{position:"relative",marginBottom:"16px"}});
  const canvas=el("canvas","sig-canvas");canvas.width=900;canvas.height=360;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,360);ctx.strokeStyle="#1a1a1a";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  const line=el("div","");line.style.cssText="position:absolute;bottom:52px;left:5%;right:5%;height:1.5px;background:#f0d0dc;pointer-events:none";
  const lbl=el("span","");lbl.style.cssText="position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-size:12px;color:#e0c0cc;letter-spacing:2px";lbl.textContent="簽名於此";
  const getPos=e=>{const rect=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:(src.clientX-rect.left)*(900/rect.width),y:(src.clientY-rect.top)*(360/rect.height)};};
  canvas.addEventListener("pointerdown",e=>{e.preventDefault();sigDrawing=true;sigLastPt=getPos(e);});
  canvas.addEventListener("pointermove",e=>{e.preventDefault();if(!sigDrawing)return;const pt=getPos(e);ctx.beginPath();ctx.moveTo(sigLastPt.x,sigLastPt.y);ctx.lineTo(pt.x,pt.y);ctx.stroke();sigLastPt=pt;});
  canvas.addEventListener("pointerup",e=>{e.preventDefault();sigDrawing=false;});
  canvas.addEventListener("pointerleave",e=>{e.preventDefault();sigDrawing=false;});
  wrap.appendChild(canvas);wrap.appendChild(line);wrap.appendChild(lbl);
  const acts=el("div","",{style:{display:"flex",gap:"10px",justifyContent:"flex-end"}});
  const btnClear=el("button","btn btn-ghost");btnClear.textContent="清除重寫";btnClear.onclick=()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,900,360);};
  const btnCancel=el("button","btn btn-ghost");btnCancel.textContent="取消";btnCancel.style.color="#888";btnCancel.onclick=()=>{overlay.remove();if(onCancel)onCancel();};
  const btnOk=el("button","btn btn-primary");btnOk.textContent="確認簽名";btnOk.onclick=()=>{overlay.remove();onSave(canvas.toDataURL("image/png"));};
  acts.appendChild(btnClear);acts.appendChild(btnCancel);acts.appendChild(btnOk);
  modal.appendChild(hdr);modal.appendChild(wrap);modal.appendChild(acts);overlay.appendChild(modal);document.body.appendChild(overlay);
}

// ── addRecord ──
function addRecord(record){
  openSig(sigImg=>{
    const full={...record,id:uid(),signature:sigImg,time:nowWithDate(record.date)};
    setRecords(rs=>[full,...rs]);
    if(record.type==="topup"){setCustomers(cs=>cs.map(c=>c.id===record.customerId?{...c,balance:(c.balance||0)+record.total}:c));}
    else{setCustomers(cs=>cs.map(c=>c.id===record.customerId?{...c,balance:(c.balance||0)-record.amount}:c));}
    showToast(record.type==="topup"?"✅ 儲值完成":"✅ 消費扣款完成");
    render();
  });
}

// ── Export / Import ──
function handleExport(){
  const data=JSON.stringify({customers:state.customers,records:state.records,exportedAt:new Date().toLocaleString("zh-TW")},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`沐蜜備份_${todayStr().replace(/\//g,"-")}.json`;a.click();URL.revokeObjectURL(url);
  showToast("📤 備份已下載，含所有資料及簽名");
}
function handleImportClick(){document.getElementById("import-input").click();}
function handleImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.customers||!data.records)return showToast("❌ 檔案格式錯誤","warn");
      if(!confirm(`確定要還原資料？\n顧客 ${data.customers.length} 位，紀錄 ${data.records.length} 筆\n⚠️ 目前資料將被覆蓋`))return;
      setCustomers(()=>data.customers);setRecords(()=>data.records);
      state.customers=data.customers;state.records=data.records;
      showToast(`✅ 還原完成！顧客 ${data.customers.length} 位`);render();
    }catch(err){showToast("❌ 無法讀取備份檔案","warn");}
  };
  reader.readAsText(file);e.target.value="";
}

// ── Backup to Sheets ──
async function handleBackupSheets(btn){
  btn.disabled=true;btn.textContent="⏳ 備份中...";
  try{
    await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"customers",rows:state.customers.map(c=>[c.name,c.phone||"",c.balance||0,c.createdAt||""])})});
    await fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"records",rows:state.records.map(r=>[r.time,r.customerName,r.type==="topup"?"儲值":"消費",r.type==="topup"?r.total:r.amount,r.service||r.plan||"",r.note||""])})});
    btn.textContent="✅ 備份成功！";btn.style.background="#6cc5a0";btn.style.color="#fff";
    setTimeout(()=>{btn.textContent="☁️ 備份到 Google Sheets";btn.style.background="";btn.style.color="";btn.disabled=false;},3000);
  }catch{btn.textContent="❌ 失敗";btn.disabled=false;}
}

// ── HOME TAB ──
function renderHome(){
  const div=el("div","");
  const totalTopup=state.records.filter(r=>r.type==="topup").reduce((s,r)=>s+r.total,0);
  const totalCharge=state.records.filter(r=>r.type==="charge").reduce((s,r)=>s+r.amount,0);
  const totalBalance=state.customers.reduce((s,c)=>s+(c.balance||0),0);
  const low=state.customers.filter(c=>(c.balance||0)<LOW_BALANCE&&(c.balance||0)>0);

  // Stats
  const statsRow=el("div","",{style:{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"14px"}});
  [["💰","總儲值","$"+fmt(totalTopup),"#f4a5b0"],["✂️","總消費","$"+fmt(totalCharge),"#a5c4f4"],["🏦","總餘額","$"+fmt(totalBalance),"#a5f4c4"],["👥","顧客數",state.customers.length+" 位","#f4d0a5"]].forEach(([icon,label,value,color])=>{
    const sc=el("div","stat-card",{style:{borderTop:`4px solid ${color}`}});
    sc.innerHTML=`<div style="font-size:24px;margin-bottom:4px">${icon}</div><div style="font-size:11px;color:#aaa;margin-bottom:4px">${label}</div><div style="font-size:17px;font-weight:800">${value}</div>`;
    statsRow.appendChild(sc);
  });
  div.appendChild(statsRow);

  // Low balance alert
  if(low.length>0){
    const alert=el("div","alert");
    alert.innerHTML=`<span style="font-size:22px">⚠️</span><div><div style="font-weight:700;color:#c0392b;font-size:14px">低餘額提醒</div><div style="font-size:13px;color:#666">${low.map(c=>`${c.name}（$${fmt(c.balance)}）`).join("、")}</div></div>`;
    div.appendChild(alert);
  }

  // Bottom grid
  const grid=el("div","",{style:{display:"grid",gridTemplateColumns:"1fr auto",gap:"14px"}});

  // Recent records
  const recCard=el("div","card");
  const recTitle=el("div","card-title");recTitle.textContent="最近紀錄";recCard.appendChild(recTitle);
  const recent=state.records.slice(0,5);
  if(recent.length===0){const e=el("div","empty");e.textContent="尚無紀錄";recCard.appendChild(e);}
  recent.forEach(r=>{
    const row=el("div","",{style:{display:"flex",gap:"10px",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f5f0f8"}});
    row.innerHTML=`<span style="font-size:18px">${r.type==="topup"?"💳":"✂️"}</span><div style="flex:1"><div style="font-weight:600;font-size:15px">${r.customerName}</div><div style="font-size:12px;color:#aaa">${r.time}</div></div><div style="font-weight:700;color:${r.type==="topup"?"#6cc5a0":"#f4a5b0"};font-size:15px">${r.type==="topup"?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div>`;
    recCard.appendChild(row);
  });
  grid.appendChild(recCard);

  // Action buttons
  const btns=el("div","",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
  const b1=el("button","btn btn-primary",{style:{fontSize:"16px",padding:"18px 28px"}});b1.textContent="💳 儲值";b1.onclick=()=>{state.tab="topup";render();};
  const b2=el("button","btn btn-secondary",{style:{fontSize:"16px",padding:"18px 28px"}});b2.textContent="✂️ 消費扣款";b2.onclick=()=>{state.tab="charge";render();};
  const b3=el("button","btn btn-ghost",{style:{fontSize:"16px",padding:"18px 28px"}});b3.textContent="👥 顧客管理";b3.onclick=()=>{state.tab="customers";render();};
  const b4=el("button","btn btn-green",{style:{fontSize:"14px",padding:"13px 20px"}});b4.textContent="☁️ 備份到 Google Sheets";b4.onclick=()=>handleBackupSheets(b4);
  const sep=el("div","",{style:{borderTop:"1px solid #f0e8f4",paddingTop:"10px",display:"flex",flexDirection:"column",gap:"8px"}});
  const sepLbl=el("div","",{style:{fontSize:"12px",color:"#bbb",textAlign:"center",fontWeight:"600"}});sepLbl.textContent="完整備份（含簽名）";
  const b5=el("button","btn btn-blue",{style:{fontSize:"14px",padding:"13px 20px"}});b5.textContent="📤 匯出備份檔案";b5.onclick=handleExport;
  const b6=el("button","btn btn-purple",{style:{fontSize:"14px",padding:"13px 20px"}});b6.textContent="📥 匯入還原資料";b6.onclick=handleImportClick;
  sep.appendChild(sepLbl);sep.appendChild(b5);sep.appendChild(b6);
  btns.appendChild(b1);btns.appendChild(b2);btns.appendChild(b3);btns.appendChild(b4);btns.appendChild(sep);
  grid.appendChild(btns);
  div.appendChild(grid);
  return div;
}

// ── CUSTOMERS TAB ──
let custMode="list",custSelected=null,custSearch="",custRecTab="all",custConfirmDel=null;
function renderCustomers(){
  const div=el("div","");
  if(custMode==="add"){
    const back=el("button","back-btn");back.textContent="← 返回";back.onclick=()=>{custMode="list";render();};
    const title=el("span","",{style:{fontSize:"20px",fontWeight:"800",color:"#3d2440"}});title.textContent="新增顧客";
    const hdr=el("div","",{style:{display:"flex",alignItems:"center",gap:"14px",marginBottom:"24px"}});hdr.appendChild(back);hdr.appendChild(title);div.appendChild(hdr);
    let photoVal="";
    const photoWrap=el("div","",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",marginBottom:"16px"}});
    const photoCircle=el("div","",{style:{width:"88px",height:"88px",borderRadius:"50%",background:"#fdf0f5",border:"2.5px dashed #f4a5b0",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}});
    photoCircle.innerHTML='<span style="font-size:28px">📷</span>';
    const photoInput=el("input","");photoInput.type="file";photoInput.accept="image/*";photoInput.style.display="none";

  filtered.forEach(r=>{
    const row=el("div","row");
    row.innerHTML=`<span style="font-size:26px">${r.type==="topup"?"💳":"✂️"}</span><div style="flex:1"><div style="font-weight:700;font-size:16px">${r.customerName}</div><div style="font-size:13px;color:#aaa">${r.type==="topup"?r.plan:r.service} · ${r.time}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:17px;color:${r.type==="topup"?"#6cc5a0":"#f4a5b0"}">${r.type==="topup"?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div><div style="font-size:11px;color:${r.signature?"#ccc":"#f4a5b0"};font-weight:${r.signature?"400":"700"}">${r.signature?"✍️ 已簽名":"⚠️ 未簽名"}</div></div>`;
    row.onclick=()=>{recSelected=r.id;recEditing=false;recConfirmDel=false;render();};
    div.appendChild(row);
  });
  return div;
}

function renderRecordDetail(detail,div){
  const back=el("button","back-btn");back.textContent="← 返回";back.onclick=()=>{recSelected=null;render();};
  const editBtn=el("button","btn btn-ghost",{style:{fontSize:"14px",padding:"9px 18px",marginLeft:"auto"}});editBtn.textContent="✏️ 修改";editBtn.onclick=()=>{recEditing=!recEditing;render();};
  const hdr=el("div","",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}});hdr.appendChild(back);
  const ht=el("span","",{style:{fontSize:"18px",fontWeight:"800",color:"#3d2440",flex:"1"}});ht.textContent="紀錄詳情";hdr.appendChild(ht);
  if(!recEditing)hdr.appendChild(editBtn);
  div.appendChild(hdr);
  const card=el("div","card",{style:{maxWidth:"640px",margin:"0 auto"}});
  // Header
  const ch=el("div","",{style:{display:"flex",gap:"12px",alignItems:"center",marginBottom:"16px"}});
  ch.innerHTML=`<span style="font-size:32px">${detail.type==="topup"?"💳":"✂️"}</span><div style="flex:1"><div style="font-weight:800;font-size:18px">${detail.customerName}</div><div style="color:#aaa;font-size:13px">${detail.time}</div></div><div style="font-weight:900;font-size:22px;color:${detail.type==="topup"?"#6cc5a0":"#f4a5b0"}">${detail.type==="topup"?"+$"+fmt(detail.total):"-$"+fmt(detail.amount)}</div>`;
  card.appendChild(ch);
  if(recEditing){
    // Edit form
    const warn=el("div","warn-box");warn.textContent="⚠️ 金額無法修改（需刪除後重建）。可修改日期、服務項目、備註。";card.appendChild(warn);
    const dateLbl=el("div","",{style:{fontSize:"13px",color:"#aaa",marginBottom:"6px"}});dateLbl.textContent="📅 交易日期";
    const dateInput=el("input","input");dateInput.type="date";dateInput.value=timeToISO(detail.time);
    if(detail.type==="charge"){
      const svcLbl=el("div","",{style:{fontSize:"13px",color:"#aaa",margin:"12px 0 6px"}});svcLbl.textContent="服務項目";
      const tagsWrap=el("div","",{style:{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"8px"}});
      let editSvc=detail.service||"";
      SERVICES.forEach(sv=>{const tb=el("button","tag-btn"+(editSvc===sv?" active":""));tb.textContent=sv;tb.onclick=()=>{editSvc=sv;tagsWrap.querySelectorAll(".tag-btn").forEach(b=>b.classList.remove("active"));tb.classList.add("active");svcInput.value=sv;};tagsWrap.appendChild(tb);});
      const svcInput=el("input","input");svcInput.placeholder="自行輸入";svcInput.value=editSvc;
      card.appendChild(dateLbl);card.appendChild(dateInput);card.appendChild(svcLbl);card.appendChild(tagsWrap);card.appendChild(svcInput);
      const noteLbl=el("div","",{style:{fontSize:"13px",color:"#aaa",margin:"12px 0 6px"}});noteLbl.textContent="備註";
      const noteInput=el("input","input");noteInput.value=detail.note||"";
      card.appendChild(noteLbl);card.appendChild(noteInput);
      const actRow=el("div","",{style:{display:"flex",gap:"10px",marginTop:"14px"}});
      const cancelBtn=el("button","btn btn-ghost",{style:{flex:"1"}});cancelBtn.textContent="取消";cancelBtn.onclick=()=>{recEditing=false;render();};
      const saveBtn=el("button","btn btn-primary",{style:{flex:"2"}});saveBtn.textContent="✅ 儲存修改";
      saveBtn.onclick=()=>{const updated={...detail,service:svcInput.value||editSvc,note:noteInput.value,date:dateInput.value,time:nowWithDate(dateInput.value)};setRecords(rs=>rs.map(r=>r.id===updated.id?updated:r));recEditing=false;showToast("✅ 紀錄已更新");render();};
      actRow.appendChild(cancelBtn);actRow.appendChild(saveBtn);card.appendChild(actRow);
    } else {
      const planLbl=el("div","",{style:{fontSize:"13px",color:"#aaa",margin:"12px 0 6px"}});planLbl.textContent="方案名稱";
      const planInput=el("input","input");planInput.value=detail.plan||"";
      const noteLbl=el("div","",{style:{fontSize:"13px",color:"#aaa",margin:"12px 0 6px"}});noteLbl.textContent="備註";
      const noteInput=el("input","input");noteInput.value=detail.note||"";
      card.appendChild(dateLbl);card.appendChild(dateInput);card.appendChild(planLbl);card.appendChild(planInput);card.appendChild(noteLbl);card.appendChild(noteInput);
      const actRow=el("div","",{style:{display:"flex",gap:"10px",marginTop:"14px"}});
      const cancelBtn=el("button","btn btn-ghost",{style:{flex:"1"}});cancelBtn.textContent="取消";cancelBtn.onclick=()=>{recEditing=false;render();};
      const saveBtn=el("button","btn btn-primary",{style:{flex:"2"}});saveBtn.textContent="✅ 儲存修改";
      saveBtn.onclick=()=>{const updated={...detail,plan:planInput.value,note:noteInput.value,date:dateInput.value,time:nowWithDate(dateInput.value)};setRecords(rs=>rs.map(r=>r.id===updated.id?updated:r));recEditing=false;showToast("✅ 紀錄已更新");render();};
      actRow.appendChild(cancelBtn);actRow.appendChild(saveBtn);card.appendChild(actRow);
    }
  } else {
    // Info cells
    const infoGrid=el("div","",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
    const ic=(label,value)=>{const d=el("div","info-cell");d.innerHTML=`<div class="info-cell-label">${label}</div><div class="info-cell-value">${value}</div>`;return d;};
    infoGrid.appendChild(ic("類型",detail.type==="topup"?"儲值":"消費扣款"));
    if(detail.type==="topup"){infoGrid.appendChild(ic("入帳金額","$"+fmt(detail.total)));infoGrid.appendChild(ic("方案",detail.plan));if(detail.bonus>0)infoGrid.appendChild(ic("贈點","$"+fmt(detail.bonus)));}
    else{infoGrid.appendChild(ic("服務項目",detail.service));infoGrid.appendChild(ic("消費金額","$"+fmt(detail.amount)));infoGrid.appendChild(ic("扣款前餘額","$"+fmt(detail.beforeBalance)));infoGrid.appendChild(ic("扣款後餘額","$"+fmt(detail.afterBalance)));}
    if(detail.note)infoGrid.appendChild(ic("備註",detail.note));
    card.appendChild(infoGrid);
    // Signature
    if(detail.signature){
      const sigDiv=el("div","",{style:{marginBottom:"14px"}});
      const sigLbl=el("div","",{style:{fontWeight:"700",color:"#aaa",fontSize:"13px",marginBottom:"8px"}});sigLbl.textContent="✍️ 顧客簽名存證";
      const sigImg=el("img","");sigImg.src=detail.signature;sigImg.style.cssText="width:100%;border-radius:10px;border:1.5px solid #eee";
      sigDiv.appendChild(sigLbl);sigDiv.appendChild(sigImg);card.appendChild(sigDiv);
    } else {
      const noSig=el("div","no-sig-box");
      noSig.innerHTML=`<div style="font-size:14px;color:#c4547a;font-weight:700;margin-bottom:8px">⚠️ 尚未簽名</div><div style="font-size:13px;color:#aaa;margin-bottom:12px">此筆紀錄還沒有顧客簽名，可補簽</div>`;
      const supBtn=el("button","btn btn-primary",{style:{fontSize:"15px",padding:"12px 28px"}});supBtn.textContent="✍️ 補簽名";
      supBtn.onclick=()=>openSig(sigImg=>{setRecords(rs=>rs.map(r=>r.id===detail.id?{...r,signature:sigImg}:r));showToast("✅ 簽名已補存");render();});
      noSig.appendChild(supBtn);card.appendChild(noSig);
    }
    // Delete
    if(recConfirmDel){
      const cb=el("div","confirm-box");
      cb.innerHTML=`<div style="font-weight:700;color:#c0392b;margin-bottom:8px">確定要刪除此筆紀錄？</div><div style="font-size:13px;color:#888;margin-bottom:14px">${detail.type==="charge"?"✅ 將自動把 $"+fmt(detail.amount)+" 還回顧客餘額":"⚠️ 將自動從顧客餘額扣除 $"+fmt(detail.total)}</div>`;
      const cActs=el("div","",{style:{display:"flex",gap:"10px",justifyContent:"center"}});
      const cNo=el("button","btn btn-ghost");cNo.textContent="取消";cNo.onclick=()=>{recConfirmDel=false;render();};
      const cYes=el("button","btn",{style:{background:"#e74c3c",color:"#fff"}});cYes.textContent="確認刪除";
      cYes.onclick=()=>{
        if(detail.type==="charge")setCustomers(cs=>cs.map(c=>c.id===detail.customerId?{...c,balance:(c.balance||0)+detail.amount}:c));
        else setCustomers(cs=>cs.map(c=>c.id===detail.customerId?{...c,balance:Math.max(0,(c.balance||0)-detail.total)}:c));
        setRecords(rs=>rs.filter(r=>r.id!==detail.id));
        recSelected=null;recConfirmDel=false;showToast("🗑️ 紀錄已刪除，餘額已還原");render();
      };
      cActs.appendChild(cNo);cActs.appendChild(cYes);cb.appendChild(cActs);card.appendChild(cb);
    } else {
      const delBtn=el("button","btn btn-danger",{style:{width:"100%",marginTop:"12px"}});delBtn.textContent="🗑️ 刪除此筆紀錄";delBtn.onclick=()=>{recConfirmDel=true;render();};card.appendChild(delBtn);
    }
  }
  div.appendChild(card);return div;
}

// ── RENDER ──
function render(){
  const root=document.getElementById("root");root.innerHTML="";
  const app=el("div","app");
  // Header
  const header=el("div","header");
  header.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:34px">🌸</span><div><div class="logo-title">沐蜜美學秘境</div><div class="logo-sub">顧客儲值管理系統</div></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="pill">顧客 ${state.customers.length} 位</div><div style="font-size:12px;color:#bbb">${todayStr()}</div></div>`;
  app.appendChild(header);
  // Nav
  const nav=el("div","nav");
  [["home","🏠","首頁"],["customers","👥","顧客"],["topup","💳","儲值"],["charge","✂️","消費"],["records","📋","紀錄"]].forEach(([key,icon,label])=>{
    const btn=el("button","nav-btn"+(state.tab===key?" active":""));btn.innerHTML=`<span>${icon}</span><span>${label}</span>`;btn.onclick=()=>{state.tab=key;render();};nav.appendChild(btn);
  });
  app.appendChild(nav);
  // Main
  const main=el("div","main");
  if(state.tab==="home")main.appendChild(renderHome());
  else if(state.tab==="customers")main.appendChild(renderCustomers());
  else if(state.tab==="topup")main.appendChild(renderTopup());
  else if(state.tab==="charge")main.appendChild(renderCharge());
  else if(state.tab==="records")main.appendChild(renderRecords());
  app.appendChild(main);
  // Import input
  const importInput=el("input","");importInput.type="file";importInput.accept=".json,application/json";importInput.id="import-input";importInput.style.display="none";importInput.onchange=handleImportFile;app.appendChild(importInput);
  root.appendChild(app);
  renderToast();
}

render();
</script>
</body>
</html>
