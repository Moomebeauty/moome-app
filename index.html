function toast(msg,type="ok"){
  const el=document.getElementById("toast-el");if(!el)return;
  el.textContent=msg;el.style.background=type==="warn"?"#e67e22":"#6cc5a0";el.style.display="block";
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display="none";},3000);
}

// ── Firebase ──
async function saveDoc(col,data){try{await setDoc(doc(db,col,data.id),data);}catch(e){toast("⚠️ 儲存失敗","warn");}}
async function delDoc(col,id){try{await deleteDoc(doc(db,col,id));}catch(e){}}

function startListeners(){
  onSnapshot(collection(db,"customers"),snap=>{customers=snap.docs.map(d=>d.data());renderAll();});
  onSnapshot(collection(db,"records"),snap=>{records=snap.docs.map(d=>d.data()).sort((a,b)=>b.time.localeCompare(a.time));renderAll();});
  onSnapshot(collection(db,"serviceRecords"),snap=>{serviceRecords=snap.docs.map(d=>d.data()).sort((a,b)=>b.time.localeCompare(a.time));renderAll();});
  onSnapshot(collection(db,"consentForms"),snap=>{consentForms=snap.docs.map(d=>d.data());renderAll();});
}

onAuthStateChanged(auth,user=>{currentUser=user;if(user)startListeners();else renderLogin();});

// ── Avatar ──
function mkAvatar(c,sz=52){
  if(c.photo){const i=ce("img");i.src=c.photo;i.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0`;return i;}
  const cols=["#f4a5b0","#a5c4f4","#a5f4c4","#f4d0a5","#c4a5f4"];
  const bg=cols[(c.name?.charCodeAt(0)||0)%cols.length];
  const d=ce("div");d.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${sz*.4}px;font-weight:700;color:#fff;flex-shrink:0`;
  d.textContent=c.name?.slice(0,1)||"?";return d;
}

// ── Signature ──
function openSig(title,cb){
  const overlay=ce("div","sig-overlay");
  const modal=ce("div","sig-modal");
  const hdr=ce("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px";
  hdr.innerHTML=`<span style="font-size:17px;font-weight:900;color:#3d2440">✍️ ${title||"請簽名確認"}</span><span style="font-size:11px;color:#aaa">Apple Pencil 或手指</span>`;
  const wrap=ce("div");wrap.style.cssText="position:relative;margin-bottom:12px";
  const canvas=ce("canvas","sig-canvas");canvas.width=900;canvas.height=300;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,300);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lp=null;
  const gp=e=>{const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(900/r.width),y:(s.clientY-r.top)*(300/r.height)};};
  canvas.onpointerdown=e=>{e.preventDefault();drawing=true;lp=gp(e);};
  canvas.onpointermove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.stroke();lp=p;};
  canvas.onpointerup=canvas.onpointerleave=e=>{e.preventDefault();drawing=false;};
  const sigLine=ce("div");sigLine.style.cssText="position:absolute;bottom:44px;left:5%;right:5%;height:1.5px;background:#f0d0dc;pointer-events:none";
  const sigLbl=ce("div");sigLbl.style.cssText="position:absolute;bottom:26px;left:50%;transform:translateX(-50%);font-size:11px;color:#e0c0cc;letter-spacing:2px";sigLbl.textContent="簽名於此";
  ap(wrap,canvas,sigLine,sigLbl);
  const acts=ce("div");acts.style.cssText="display:flex;gap:8px;justify-content:flex-end";
  const bClr=ce("button","btn btn-g");bClr.textContent="清除";bClr.onclick=()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,900,300);};
  const bCan=ce("button","btn btn-g");bCan.textContent="取消";bCan.style.color="#888";bCan.onclick=()=>overlay.remove();
  const bOk=ce("button","btn btn-p");bOk.textContent="確認簽名";bOk.onclick=()=>{overlay.remove();cb(canvas.toDataURL("image/png"));};
  ap(acts,bClr,bCan,bOk);ap(modal,hdr,wrap,acts);overlay.appendChild(modal);document.body.appendChild(overlay);
}

// ── Export ──
function doExport(){
  const data=JSON.stringify({customers,records,serviceRecords,consentForms,at:new Date().toLocaleString("zh-TW")},null,2);
  const a=ce("a");a.href=URL.createObjectURL(new Blob([data],{type:"application/json"}));
  a.download=`沐蜜備份_${todayStr().replace(/\//g,"-")}.json`;a.click();
  toast("📤 備份已下載");
}

async function doSheets(btn){
  btn.disabled=true;btn.textContent="⏳ 備份中...";
  try{
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"customers",rows:customers.map(c=>[c.name,c.phone||"",c.balance||0,c.createdAt||""])})});
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"records",rows:serviceRecords.map(r=>[r.time,r.customerName,r.service,r.amount||0,r.payMethod||"",r.notes||""])})});
    btn.textContent="✅ 成功";btn.style.background="#6cc5a0";btn.style.color="#fff";
    setTimeout(()=>{btn.textContent="☁️ 備份到 Google Sheets";btn.style.cssText="";btn.disabled=false;},3000);
  }catch{btn.textContent="❌ 失敗";btn.disabled=false;}
}

  const totalCash=serviceRecords.filter(r=>r.payMethod==="現金").reduce((s,r)=>s+(Number(r.amount)||0),0)+records.filter(r=>r.cash).reduce((s,r)=>s+(Number(r.cash)||0),0);
  const totalBal=customers.reduce((s,c)=>s+(c.balance||0),0);
  const low=customers.filter(c=>(c.balance||0)<LOW&&(c.balance||0)>0);
  const sr=ce("div","stat-row");
  [["✂️","服務營業額","$"+fmt(totalSvc),"#a5c4f4"],["💳","儲值金額","$"+fmt(totalTopup),"#f4a5b0"],["💵","收現金額","$"+fmt(totalCash),"#a5e8c4"],["🏦","儲值餘額","$"+fmt(totalBal),"#a5f4c4"],["👥","客人數",customers.length+" 位","#f4d0a5"]].forEach(([icon,lbl,val,color])=>{

  const grid=ce("div");grid.style.cssText="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start";
  const recCard=ce("div","card");
  const rt=ce("div","card-title");rt.textContent="最近服務紀錄";recCard.appendChild(rt);
  const recent=[...serviceRecords].slice(0,5);
  if(!recent.length){const e=ce("div","empty");e.textContent="尚無服務紀錄";recCard.appendChild(e);}
  recent.forEach(r=>{const row=ce("div");row.style.cssText="display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #f5f0f8";row.innerHTML=`<span style="font-size:16px">✂️</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${r.customerName}</div><div style="font-size:11px;color:#aaa">${r.service} · ${r.time}</div></div><div style="text-align:right"><div style="font-weight:700;font-size:13px;color:#6a3aa5">$${fmt(r.amount)}</div><div style="font-size:10px;color:#aaa">${r.payMethod||""}</div></div>`;recCard.appendChild(row);});
  grid.appendChild(recCard);
  const btns=ce("div");btns.style.cssText="display:flex;flex-direction:column;gap:8px";
  const mk=(cls,txt,fn)=>{const b=ce("button","btn "+cls);b.style.fontSize="13px";b.textContent=txt;b.onclick=fn;return b;};
  const bSheets=ce("button","btn btn-green");bSheets.style.fontSize="12px";bSheets.textContent="☁️ 備份 Google Sheets";bSheets.onclick=()=>doSheets(bSheets);

  ap(btns,mk("btn-teal","✂️ 新增服務",()=>goTab("service")),mk("btn-p","💳 儲值",()=>goTab("topup")),mk("btn-s","💸 扣款",()=>goTab("charge")),mk("btn-g","👥 客人管理",()=>goTab("customers")),bSheets,bExp);

let cMode="list",cSel=null,cSearch="",cSubTab="service",cDelConfirm=false,cConsentType=null,cConsentView=null;

function renderCustomers(){
  const wrap=ce("div");
  if(cConsentView){return renderConsentView(wrap);}
  if(cConsentType){return renderConsentForm(wrap);}
  if(cMode==="add"){return renderAddCustomer(wrap);}
  if(cMode==="detail"&&cSel){return renderCustomerDetail(wrap);}
  // List
  const topBar=ce("div");topBar.style.cssText="display:flex;gap:8px;margin-bottom:12px";
  const si=ce("input","input");si.placeholder="🔍 搜尋姓名或電話";si.value=cSearch;si.style.flex="1";si.oninput=e=>{cSearch=e.target.value;goTab("customers");};
  const ab=ce("button","btn btn-p");ab.style.whiteSpace="nowrap";ab.textContent="＋ 新增";ab.onclick=()=>{cMode="add";goTab("customers");};
  ap(topBar,si,ab);wrap.appendChild(topBar);
  const filtered=customers.filter(c=>c.name.includes(cSearch)||(c.phone||"").includes(cSearch));
  if(!filtered.length){const e=ce("div","empty");e.textContent="尚無客人資料";wrap.appendChild(e);}
  filtered.forEach(c=>{
    const cSvcRecs=serviceRecords.filter(r=>r.customerId===c.id);
    const lastSvc=cSvcRecs[0];
    const row=ce("div","row-item");row.appendChild(mkAvatar(c,48));
    const info=ce("div");info.style.flex="1";info.innerHTML=`<div style="font-weight:700;font-size:15px">${c.name}</div><div style="font-size:11px;color:#aaa">${c.phone||"未填電話"}${lastSvc?` · 上次：${lastSvc.time.slice(0,10)}`:""}  </div>`;
    const right=ce("div");right.style.textAlign="right";right.innerHTML=`<div style="font-size:11px;color:#aaa">服務 ${cSvcRecs.length} 次</div>${(c.balance||0)>0?`<div style="font-size:13px;font-weight:800;color:#6cc5a0">餘額 $${fmt(c.balance)}</div>`:""}`;
    ap(row,info,right);row.onclick=()=>{cSel=c.id;cMode="detail";cSubTab="service";cDelConfirm=false;goTab("customers");};wrap.appendChild(row);
  });
  return wrap;
}

function renderAddCustomer(wrap){
  const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{cMode="list";goTab("customers");};
  const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:16px";
  ap(hdr,back,Object.assign(ce("span"),{style:"font-size:17px;font-weight:800;color:#3d2440",textContent:"新增客人"}));wrap.appendChild(hdr);
  let photoVal="";
  const pWrap=ce("div");pWrap.style.cssText="display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:12px";
  const pCircle=ce("div");pCircle.style.cssText="width:80px;height:80px;border-radius:50%;background:#fdf0f5;border:2.5px dashed #f4a5b0;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;font-size:24px";pCircle.textContent="📷";
  const pInput=ce("input");pInput.type="file";pInput.accept="image/*";pInput.style.display="none";
  pInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{photoVal=ev.target.result;pCircle.innerHTML=`<img src="${photoVal}" style="width:100%;height:100%;object-fit:cover">`;};r.readAsDataURL(f);};
  pCircle.onclick=()=>pInput.click();
  ap(pWrap,pCircle,Object.assign(ce("span"),{style:"font-size:11px;color:#bbb",textContent:"點擊上傳照片"}),pInput);wrap.appendChild(pWrap);

  const subBtn=ce("button","btn btn-p");subBtn.style.cssText="width:100%;font-size:16px;padding:14px";subBtn.textContent="確認新增";
  subBtn.onclick=async()=>{
    if(!nameIn.value.trim())return toast("請輸入客人姓名","warn");
    subBtn.disabled=true;subBtn.textContent="儲存中...";
    const c={id:uid(),balance:0,createdAt:todayStr(),name:nameIn.value.trim(),phone:phoneIn.value.trim(),birthday:bdIn.value.trim(),referral:refIn.value.trim(),photo:photoVal};
    await saveDoc("customers",c);cMode="list";toast("✅ 客人新增完成");goTab("customers");

  ap(wrap,nameIn,phoneIn,bdIn,refIn,subBtn);return wrap;

function renderCustomerDetail(wrap){
  const c=customers.find(x=>x.id===cSel);if(!c){cMode="list";return renderCustomers();}
  const cSvcRecs=serviceRecords.filter(r=>r.customerId===c.id);
  const cTopupRecs=records.filter(r=>(r.cid===c.id||r.customerId===c.id)&&r.type==="topup");
  const cChargeRecs=records.filter(r=>(r.cid===c.id||r.customerId===c.id)&&r.type==="charge");
  const cConsents=consentForms.filter(f=>f.customerId===c.id);
  const totalSvc=cSvcRecs.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{cMode="list";cSel=null;cDelConfirm=false;goTab("customers");};
  const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:10px;margin-bottom:12px";
  ap(hdr,back,Object.assign(ce("span"),{style:"font-size:17px;font-weight:800;color:#3d2440",textContent:"客人詳情"}));wrap.appendChild(hdr);
  // Profile card
  const prof=ce("div","card");prof.style.cssText="display:flex;gap:14px;align-items:flex-start";
  prof.appendChild(mkAvatar(c,64));
  const pInfo=ce("div");pInfo.style.flex="1";
  pInfo.innerHTML=`<div style="font-size:19px;font-weight:800;margin-bottom:2px">${c.name}</div><div style="font-size:12px;color:#888;margin-bottom:2px">${c.phone||"未填電話"}</div>${c.birthday?`<div style="font-size:12px;color:#aaa">🎂 ${c.birthday}</div>`:""}<div style="font-size:11px;color:#ccc;margin-top:4px">建檔：${c.createdAt}</div>`;
  const pStats=ce("div");pStats.style.cssText="display:flex;flex-direction:column;gap:5px;text-align:right;flex-shrink:0";
  pStats.innerHTML=`<div style="background:#f0fff6;border-radius:9px;padding:6px 10px;text-align:center"><div style="font-size:10px;color:#aaa">服務次數</div><div style="font-weight:800;color:#6a3aa5;font-size:16px">${cSvcRecs.length} 次</div></div><div style="background:#f0f8ff;border-radius:9px;padding:6px 10px;text-align:center"><div style="font-size:10px;color:#aaa">服務消費</div><div style="font-weight:800;color:#4a6fa5;font-size:14px">$${fmt(totalSvc)}</div></div>${(c.balance||0)>0?`<div style="background:#f0fff6;border-radius:9px;padding:6px 10px;text-align:center"><div style="font-size:10px;color:#aaa">儲值餘額</div><div style="font-weight:800;color:#6cc5a0;font-size:14px">$${fmt(c.balance)}</div></div>`:""}`;
  ap(prof,pInfo,pStats);wrap.appendChild(prof);
  // Sub tabs
  const pills=ce("div","tab-pills");
  [["service","✂️ 服務紀錄"],["consent","📋 同意書"],["topup","💳 儲值紀錄"]].forEach(([k,l])=>{
    const fb=ce("button","fb"+(cSubTab===k?" on":""));fb.textContent=l;fb.onclick=()=>{cSubTab=k;goTab("customers");};pills.appendChild(fb);
  });
  wrap.appendChild(pills);
  if(cSubTab==="service"){
    const addSvcBtn=ce("button","btn btn-teal");addSvcBtn.style.cssText="width:100%;margin-bottom:10px;font-size:13px";addSvcBtn.textContent="＋ 新增服務紀錄";
    addSvcBtn.onclick=()=>{svcPreCid=c.id;goTab("service");};wrap.appendChild(addSvcBtn);
    if(!cSvcRecs.length){const e=ce("div","empty");e.textContent="尚無服務紀錄";wrap.appendChild(e);}
    cSvcRecs.forEach(r=>{
      const row=ce("div","row-item");row.onclick=()=>{rSvcSel=r.id;goTab("records");};
      row.innerHTML=`<span style="font-size:20px">✂️</span><div style="flex:1"><div style="font-weight:700;font-size:14px">${r.service}</div><div style="font-size:11px;color:#aaa">${r.time}</div>${r.notes?`<div style="font-size:11px;color:#bbb;margin-top:2px">${r.notes.slice(0,40)}${r.notes.length>40?"...":""}</div>`:""}</div><div style="text-align:right"><div style="font-weight:800;font-size:14px;color:#6a3aa5">$${fmt(r.amount)}</div><div style="font-size:10px;color:#aaa">${r.payMethod||""}</div>${r.signature?'<div style="font-size:10px;color:#ccc">✍️ 已簽</div>':'<div style="font-size:10px;color:#f4a5b0;font-weight:700">⚠️ 未簽</div>'}</div>`;
      wrap.appendChild(row);
    });
  } else if(cSubTab==="consent"){
    const addConsentDiv=ce("div","card");addConsentDiv.style.marginBottom="10px";
    const ct=ce("div","card-title");ct.textContent="新增同意書";addConsentDiv.appendChild(ct);
    const cg=ce("div");cg.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px";
    Object.entries(CONSENT_FORMS).forEach(([key,form])=>{
      const existing=cConsents.find(f=>f.formType===key);
      const cb=ce("button","consent-card "+(existing?"signed":"unsigned"));
      cb.innerHTML=`<span style="font-size:22px">${form.icon}</span><div><div style="font-weight:700;font-size:13px">${form.title}</div><div style="font-size:11px;color:${existing?"#6cc5a0":"#bbb"}">${existing?"✅ 已簽 "+existing.signedAt.slice(0,10):"尚未填寫"}</div></div>`;
      cb.onclick=()=>{if(existing){cConsentView=existing;goTab("customers");}else{cConsentType=key;goTab("customers");}};
      cg.appendChild(cb);
    });
    addConsentDiv.appendChild(cg);wrap.appendChild(addConsentDiv);
  } else if(cSubTab==="topup"){
    const allRecs=[...cTopupRecs,...cChargeRecs].sort((a,b)=>b.time.localeCompare(a.time));
    if(!allRecs.length){const e=ce("div","empty");e.textContent="尚無儲值紀錄";wrap.appendChild(e);}
    allRecs.forEach(r=>{
      const row=ce("div","row-item");
      row.innerHTML=`<span style="font-size:20px">${r.type==="topup"?"💳":"💸"}</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${r.type==="topup"?r.plan:"扣款"}</div><div style="font-size:11px;color:#aaa">${r.time}</div></div><div style="font-weight:800;font-size:14px;color:${r.type==="topup"?"#6cc5a0":"#f4a5b0"}">${r.type==="topup"?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div>`;
      wrap.appendChild(row);
    });
  }
  // Delete

function showReceipt(rec,cust,onSign){
  const overlay=ce("div","sig-overlay");
  const modal=ce("div","sig-modal");modal.style.maxHeight="90vh";modal.style.overflowY="auto";
  const title=ce("div");title.style.cssText="text-align:center;margin-bottom:14px";
  title.innerHTML=`<div style="font-size:22px">🌸</div><div style="font-size:16px;font-weight:900;color:#3d2440">沐蜜美學秘境</div><div style="font-size:11px;color:#aaa">服務收據</div>`;
  const box=ce("div","receipt-box");
  const rows=[["客人",cust.name],["電話",cust.phone||""],["服務日期",isoToDisp(rec.date)],["服務項目",rec.service],rec.notes?["操作備註",rec.notes]:null,["付款方式",rec.payMethod]].filter(Boolean);
  rows.forEach(([k,v])=>{const r=ce("div","receipt-row");r.innerHTML=`<span style="color:#aaa">${k}</span><span style="font-weight:600">${v}</span>`;box.appendChild(r);});
  const tot=ce("div","receipt-total");tot.innerHTML=`<span>實收金額</span><span style="color:${rec.payMethod==="免費"?"#6cc5a0":"#3d2440"}">$${fmt(rec.amount)}${rec.payMethod==="免費"?" (免費)":""}</span>`;box.appendChild(tot);
  const sigTitle=ce("div");sigTitle.style.cssText="font-size:13px;font-weight:700;color:#3d2440;margin:14px 0 8px";sigTitle.textContent="✍️ 客人簽名確認";
  const canvas=ce("canvas","sig-canvas");canvas.width=900;canvas.height=260;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,260);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lp=null;
  const gp=e=>{const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(900/r.width),y:(s.clientY-r.top)*(260/r.height)};};
  canvas.onpointerdown=e=>{e.preventDefault();drawing=true;lp=gp(e);};
  canvas.onpointermove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.stroke();lp=p;};
  canvas.onpointerup=canvas.onpointerleave=e=>{e.preventDefault();drawing=false;};
  const sigLine=ce("div");sigLine.style.cssText="position:relative;height:1.5px;background:#f0d0dc;margin:0 5%;margin-top:-40px;pointer-events:none";
  const sigLbl=ce("div");sigLbl.style.cssText="text-align:center;font-size:11px;color:#e0c0cc;letter-spacing:2px;margin-bottom:10px";sigLbl.textContent="簽名於此";
  const acts=ce("div");acts.style.cssText="display:flex;gap:8px;justify-content:flex-end;margin-top:10px";
  const bClr=ce("button","btn btn-g");bClr.textContent="清除";bClr.onclick=()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,900,260);};
  const bCan=ce("button","btn btn-g");bCan.textContent="取消";bCan.style.color="#888";bCan.onclick=()=>overlay.remove();
  const bOk=ce("button","btn btn-p");bOk.textContent="✅ 確認簽名，完成結帳";
  bOk.onclick=()=>{overlay.remove();onSign(canvas.toDataURL("image/png"));};
  ap(acts,bClr,bCan,bOk);ap(modal,title,box,sigTitle,canvas,sigLine,sigLbl,acts);overlay.appendChild(modal);document.body.appendChild(overlay);
}

  sel.value=chCid;sel.onchange=e=>{chCid=e.target.value;goTab("charge");};lc.appendChild(sel);
  const cust=customers.find(c=>c.id===chCid);
  if(cust){const ci=ce("div");ci.style.cssText="display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px;background:#fdf6f9;border-radius:9px";ci.appendChild(mkAvatar(cust,40));const cii=ce("div");cii.innerHTML=`<div style="font-weight:700;font-size:14px">${cust.name}</div><div style="color:${(cust.balance||0)<LOW?"#e74c3c":"#aaa"};font-size:11px">${(cust.balance||0)<LOW?"⚠️ ":""}餘額 $${fmt(cust.balance||0)}</div>`;ci.appendChild(cii);lc.appendChild(ci);}
  const dlbl=ce("div");dlbl.style.cssText="font-size:11px;color:#aaa;margin:10px 0 4px";dlbl.textContent="📅 交易日期";
  const din=ce("input","input");din.type="date";din.value=chDate;din.onchange=e=>{chDate=e.target.value;};ap(lc,dlbl,din);wrap.appendChild(lc);
  const amtCard=ce("div","card");const at=ce("div","card-title");at.textContent="扣款金額";amtCard.appendChild(at);
  const ar=ce("div");ar.style.cssText="display:flex;gap:8px;align-items:center";
  const ai=ce("input","input");ai.type="number";ai.placeholder="0";ai.style.cssText="flex:1;font-size:24px;font-weight:800;text-align:center";
  const au=ce("div");au.style.cssText="font-size:20px;color:#ddd";au.textContent="元";ap(ar,ai,au);amtCard.appendChild(ar);
  const bb=ce("div");bb.style.marginTop="10px";amtCard.appendChild(bb);
  function updatePreview(){
    const a=Number(ai.value)||0;const sb2=document.getElementById("charge-sb");
    if(!a||!cust){bb.innerHTML="";if(sb2)sb2.disabled=true;return;}
    const after=(cust.balance||0)-a;
    bb.style.cssText=`margin-top:10px;padding:10px;background:${after<0?"#fff0f0":"#f0fff6"};border-radius:9px`;
    if(after<0){bb.innerHTML=`<div style="color:#e74c3c;font-weight:700">⚠️ 餘額不足！差 $${fmt(Math.abs(after))}</div>`;}
    else{bb.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="color:#aaa;font-size:11px">扣款後餘額</div><div style="font-size:22px;font-weight:900;color:${after<LOW?"#e67e22":"#6cc5a0"}">$${fmt(after)}</div></div><div style="font-size:26px">${after<LOW?"⚠️":"✅"}</div></div>`;}
    if(sb2)sb2.disabled=!(cust&&a>0&&(cust.balance||0)>=a);
  }
  ai.oninput=updatePreview;
  const ni=ce("input","input");ni.placeholder="備註（選填）";ni.value=chNote;ni.oninput=e=>{chNote=e.target.value;};ni.style.margin="10px 0 0";amtCard.appendChild(ni);
  const sb=ce("button","btn btn-s");sb.id="charge-sb";sb.style.cssText="width:100%;font-size:16px;padding:14px;margin-top:10px";sb.textContent="💸 確認扣款，前往簽名";sb.disabled=true;
  sb.onclick=async()=>{
    const finalAmt=Number(ai.value)||0;
    if(!cust||!finalAmt||(cust.balance||0)<finalAmt)return;
    const afterBal=(cust.balance||0)-finalAmt;
    openSig("扣款確認簽名",async sig=>{
      const full={id:uid(),type:"charge",cid:cust.id,customerId:cust.id,customerName:cust.name,amount:finalAmt,beforeBalance:cust.balance||0,afterBalance:afterBal,note:ni.value,date:chDate,time:timeStr(chDate),signature:sig};
      await saveDoc("customers",{...cust,balance:afterBal});
      await saveDoc("records",full);
      chCid="";chNote="";chDate=todayISO();chCash="";
      toast("✅ 扣款完成");goTab("home");
    });
  };
  amtCard.appendChild(sb);wrap.appendChild(amtCard);return wrap;
}

// ═══════════════════════════════════
// ── RECORDS ──
// ═══════════════════════════════════
let rFilter="all",rSvcSel=null,rSearch="",rDate="",rMonth="",rDelConfirm=false;
function renderRecords(){
  const wrap=ce("div");
  if(rSvcSel){const det=serviceRecords.find(r=>r.id===rSvcSel);if(!det){rSvcSel=null;return renderRecords();}return renderSvcDetail(det,wrap);}
  const fr=ce("div");fr.style.cssText="display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap";
  [["all","全部"],["service","服務"],["topup","儲值"],["charge","扣款"]].forEach(([k,l])=>{const fb=ce("button","fb"+(rFilter===k?" on":""));fb.textContent=l;fb.onclick=()=>{rFilter=k;goTab("records");};fr.appendChild(fb);});
  wrap.appendChild(fr);
  const sr=ce("div");sr.style.cssText="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap";
  const si=ce("input","input");si.placeholder="🔍 搜尋客人姓名";si.value=rSearch;si.style.flex="1";si.oninput=e=>{rSearch=e.target.value;goTab("records");};
  const dw=ce("div");dw.style.cssText="display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #f0e8f4;border-radius:10px;padding:0 9px;flex:1;min-width:130px";
  dw.innerHTML='<span style="font-size:13px;color:#aaa">📅</span>';
  const di=ce("input");di.type="date";di.style.cssText="flex:1;border:none;outline:none;font-size:13px;color:#3d2440;background:transparent;padding:10px 0;font-family:inherit";di.value=rDate;di.onchange=e=>{rDate=e.target.value;rMonth="";goTab("records");};dw.appendChild(di);
  if(rDate){const clr=ce("button");clr.style.cssText="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px";clr.textContent="×";clr.onclick=()=>{rDate="";goTab("records");};dw.appendChild(clr);}
  ap(sr,si,dw);wrap.appendChild(sr);
  const mr=ce("div");mr.style.cssText="display:flex;gap:8px;margin-bottom:10px;align-items:center";
  const mlbl=ce("div");mlbl.style.cssText="font-size:11px;color:#888;font-weight:700;white-space:nowrap";mlbl.textContent="📆 月份統計";
  const mw=ce("div");mw.style.cssText="display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #f0e8f4;border-radius:10px;padding:0 9px;flex:1";
  mw.innerHTML='<span style="font-size:13px;color:#aaa">月份</span>';
  const mi=ce("input");mi.type="month";mi.style.cssText="flex:1;border:none;outline:none;font-size:13px;color:#3d2440;background:transparent;padding:10px 0;font-family:inherit";mi.value=rMonth;mi.onchange=e=>{rMonth=e.target.value;rDate="";goTab("records");};mw.appendChild(mi);
  if(rMonth){const mclr=ce("button");mclr.style.cssText="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px";mclr.textContent="×";mclr.onclick=()=>{rMonth="";goTab("records");};mw.appendChild(mclr);}
  ap(mr,mlbl,mw);wrap.appendChild(mr);
  if(rMonth){
    const [my,mm]=rMonth.split("-");
    const mSvc=serviceRecords.filter(r=>{const d=r.time.match(/(\d{4})\/(\d{2})/);return d&&d[1]===my&&d[2]===mm;});
    const mTop=records.filter(r=>r.type==="topup"&&r.time.match(/(\d{4})\/(\d{2})/)?.slice(1).join("-")===`${my}-${mm}`);
    const mSvcAmt=mSvc.reduce((s,r)=>s+(Number(r.amount)||0),0);
    const mTopAmt=mTop.reduce((s,r)=>s+(r.total||0),0);
    const mCash=mSvc.filter(r=>r.payMethod==="現金").reduce((s,r)=>s+(Number(r.amount)||0),0);
    const ms=ce("div","card");ms.style.cssText="background:linear-gradient(135deg,#fdf0f5,#f0f8ff);padding:13px;margin-bottom:10px";
    ms.innerHTML=`<div style="font-size:12px;font-weight:800;color:#3d2440;margin-bottom:9px">📊 ${my} 年 ${mm} 月統計</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px"><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px;border:1px solid #f0e8f4"><div style="font-size:10px;color:#aaa;margin-bottom:2px">✂️ 服務金額</div><div style="font-weight:900;color:#6a3aa5;font-size:14px">$${fmt(mSvcAmt)}</div><div style="font-size:10px;color:#ccc;margin-top:1px">${mSvc.length} 筆</div></div><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px;border:1px solid #f0e8f4"><div style="font-size:10px;color:#aaa;margin-bottom:2px">💳 儲值金額</div><div style="font-weight:900;color:#f4a5b0;font-size:14px">$${fmt(mTopAmt)}</div><div style="font-size:10px;color:#ccc;margin-top:1px">${mTop.length} 筆</div></div><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px;border:1px solid #f0e8f4"><div style="font-size:10px;color:#aaa;margin-bottom:2px">💵 收現金額</div><div style="font-weight:900;color:#2e7d52;font-size:14px">$${fmt(mCash)}</div><div style="font-size:10px;color:#ccc;margin-top:1px">現金 ${mSvc.filter(r=>r.payMethod==="現金").length} 筆</div></div></div>`;
    wrap.appendChild(ms);
  }
  // Combine and filter
  const allSvc=serviceRecords.map(r=>({...r,_type:"service"}));
  const allRec=records.map(r=>({...r,_type:r.type}));
  let combined=[...allSvc,...allRec].sort((a,b)=>b.time.localeCompare(a.time));
  combined=combined.filter(r=>{
    if(rFilter==="service"&&r._type!=="service")return false;
    if(rFilter==="topup"&&r._type!=="topup")return false;
    if(rFilter==="charge"&&r._type!=="charge")return false;
    if(rSearch&&!r.customerName.includes(rSearch))return false;
    if(rDate&&!r.time.startsWith(isoToDisp(rDate)))return false;
    if(rMonth){const[my,mm]=rMonth.split("-");const d=r.time.match(/(\d{4})\/(\d{2})/);if(!d||d[1]!==my||d[2]!==mm)return false;}
    return true;
  });
  if(!combined.length){const e=ce("div","empty");e.textContent="尚無符合紀錄";wrap.appendChild(e);}
  combined.forEach(r=>{
    const row=ce("div","row-item");
    const isS=r._type==="service";
    const iT=r._type==="topup";
    row.innerHTML=`<span style="font-size:22px">${isS?"✂️":iT?"💳":"💸"}</span><div style="flex:1"><div style="font-weight:700;font-size:14px">${r.customerName}</div><div style="font-size:11px;color:#aaa">${isS?r.service:iT?r.plan:"扣款"} · ${r.time}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:14px;color:${isS?"#6a3aa5":iT?"#6cc5a0":"#f4a5b0"}">${isS?"$"+fmt(r.amount):iT?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div>${isS?(r.payMethod?`<div style="font-size:10px;color:#aaa">${r.payMethod}</div>`:""):""}${r.signature?'<div style="font-size:10px;color:#ccc">✍️ 已簽</div>':'<div style="font-size:10px;color:#f4a5b0;font-weight:700">⚠️ 未簽</div>'}</div>`;
    row.onclick=()=>{if(isS){rSvcSel=r.id;goTab("records");}};wrap.appendChild(row);
  });
  return wrap;
}

function renderSvcDetail(det,wrap){
  const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{rSvcSel=null;goTab("records");};
  const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:9px;margin-bottom:12px";
  ap(hdr,back,Object.assign(ce("span"),{style:"font-size:16px;font-weight:800;color:#3d2440;flex:1",textContent:"服務紀錄詳情"}));wrap.appendChild(hdr);
  const card=ce("div","card");
  const ch=ce("div");ch.style.cssText="display:flex;gap:10px;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0e8f4";
  ch.innerHTML=`<span style="font-size:26px">✂️</span><div style="flex:1"><div style="font-weight:800;font-size:16px">${det.customerName}</div><div style="color:#aaa;font-size:11px">${det.time}</div></div><div style="text-align:right"><div style="font-weight:900;font-size:18px;color:#6a3aa5">$${fmt(det.amount)}</div><div style="font-size:11px;color:#aaa">${det.payMethod||""}</div></div>`;
  card.appendChild(ch);
  const ig=ce("div");ig.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px";
  const ic2=(l,v)=>{const d=ce("div","ic");d.innerHTML=`<div class="ic-l">${l}</div><div class="ic-v">${v}</div>`;return d;};
  ap(ig,ic2("服務項目",det.service),ic2("付款方式",det.payMethod||""),ic2("服務日期",isoToDisp(det.date)||det.time.slice(0,10)),ic2("實收金額","$"+fmt(det.amount)));
  card.appendChild(ig);
  if(det.notes){const nb=ce("div","ic");nb.style.marginBottom="12px";nb.innerHTML=`<div class="ic-l">操作備註</div><div style="font-size:13px;color:#3d2440;line-height:1.6;white-space:pre-wrap">${det.notes}</div>`;card.appendChild(nb);}
  if(det.signature){
    const sd=ce("div");sd.style.marginBottom="12px";
    sd.innerHTML='<div style="font-weight:700;color:#aaa;font-size:12px;margin-bottom:7px">✍️ 客人簽名收據</div>';
    const si=ce("img");si.src=det.signature;si.style.cssText="width:100%;border-radius:9px;border:1.5px solid #eee";sd.appendChild(si);card.appendChild(sd);
  }else{
    const ns=ce("div","no-sig");ns.innerHTML='<div style="font-size:12px;color:#c4547a;font-weight:700;margin-bottom:5px">⚠️ 尚未簽名</div><div style="font-size:11px;color:#aaa;margin-bottom:10px">可補簽名</div>';
    const sb2=ce("button","btn btn-p");sb2.style.cssText="font-size:13px;padding:9px 22px";sb2.textContent="✍️ 補簽名";
    sb2.onclick=()=>openSig("補簽名",async sig=>{await saveDoc("serviceRecords",{...det,signature:sig});toast("✅ 簽名已補存");goTab("records");});
    ns.appendChild(sb2);card.appendChild(ns);
  }
  if(rDelConfirm){
    const cb=ce("div","confirm-box");cb.innerHTML='<div style="font-weight:700;color:#c0392b;margin-bottom:6px">確定要刪除此筆紀錄？</div><div style="font-size:12px;color:#888;margin-bottom:10px">此操作無法復原</div>';
    const ca=ce("div");ca.style.cssText="display:flex;gap:8px;justify-content:center";
    const cNo=ce("button","btn btn-g");cNo.textContent="取消";cNo.onclick=()=>{rDelConfirm=false;goTab("records");};
    const cYes=ce("button","btn");cYes.style.cssText="background:#e74c3c;color:#fff";cYes.textContent="確認刪除";
    cYes.onclick=async()=>{cYes.disabled=true;await delDoc("serviceRecords",det.id);rSvcSel=null;rDelConfirm=false;toast("🗑️ 紀錄已刪除");goTab("records");};
    ap(ca,cNo,cYes);cb.appendChild(ca);card.appendChild(cb);
  }else{
    const db2=ce("button","btn btn-red");db2.style.cssText="width:100%;margin-top:10px;font-size:13px";db2.textContent="🗑️ 刪除此筆紀錄";db2.onclick=()=>{rDelConfirm=true;goTab("records");};card.appendChild(db2);
  }
  wrap.appendChild(card);return wrap;
}

// ═══════════════════════════════════
// ── RENDER ALL ──
// ═══════════════════════════════════
function goTab(tab){currentTab=tab;renderAll();}

function renderAll(){
  if(!currentUser){renderLogin();return;}
  const root=document.getElementById("root");root.innerHTML="";
  const appDiv=ce("div");appDiv.style.cssText="height:100vh;display:flex;flex-direction:column";
  const hdr=ce("header");
  const logo=ce("div");logo.style.cssText="display:flex;align-items:center;gap:10px";logo.innerHTML='<span style="font-size:26px">🌸</span><div><div class="logo-title">沐蜜美學秘境</div><div class="logo-sub">顧客管理系統</div></div>';
  const right=ce("div");right.style.cssText="display:flex;align-items:center;gap:7px";
  const pill=ce("div","pill");pill.textContent="客人 "+customers.length+" 位";
  const logoutBtn=ce("button","logout-btn");logoutBtn.textContent="登出";logoutBtn.onclick=async()=>await signOut(auth);
  ap(right,pill,logoutBtn);ap(hdr,logo,right);appDiv.appendChild(hdr);
  const nav=ce("nav");
  [["home","🏠","首頁"],["customers","👥","客人"],["service","✂️","服務"],["topup","💳","儲值"],["charge","💸","扣款"],["records","📋","紀錄"]].forEach(([key,icon,label])=>{
    const btn=ce("button","nav-btn"+(currentTab===key?" active":""));btn.innerHTML=`<span class="nav-icon">${icon}</span><span>${label}</span>`;btn.onclick=()=>{if(key==="service"){svcPreCid="";}goTab(key);};nav.appendChild(btn);
  });
  appDiv.appendChild(nav);
  const main=ce("main");
  if(currentTab==="home")main.appendChild(renderHome());
  else if(currentTab==="customers")main.appendChild(renderCustomers());
  else if(currentTab==="service")main.appendChild(renderService());
  else if(currentTab==="topup")main.appendChild(renderTopup());
  else if(currentTab==="charge")main.appendChild(renderCharge());
  else if(currentTab==="records")main.appendChild(renderRecords());
  appDiv.appendChild(main);root.appendChild(appDiv);
}
</script>
