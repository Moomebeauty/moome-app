const saveD=async(col,data)=>{try{await setDoc(doc(db,col,data.id),data);}catch(e){toast("⚠️ 儲存失敗","warn");}};
const delD=async(col,id)=>{try{await deleteDoc(doc(db,col,id));}catch(e){console.error(e);}};

async function deleteCustomerAll(c){
  for(const r of serviceRecords.filter(r=>r.customerId===c.id)) await delD("serviceRecords",r.id);
  for(const r of records.filter(r=>r.customerId===c.id||r.cid===c.id)) await delD("records",r.id);
  for(const r of consentForms.filter(r=>r.customerId===c.id)) await delD("consentForms",r.id);
  await delD("customers",c.id);
}

async function deleteRecord(r){
  const c=customers.find(x=>x.id===r.customerId||x.id===r.cid);
  if(c){
    let nb=c.balance||0;
    if(r.type==="topup") nb=Math.max(0,nb-(r.total||0));
    else if(r.type==="charge") nb=nb+(r.amount||0);
    await saveD("customers",{...c,balance:nb});
  }
  await delD("records",r.id);
}

// signature canvas builder
function mkSigCanvas(w,h){
  const canvas=ce("canvas","sig-canvas");canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lp=null;
  const gp=e=>{const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(w/r.width),y:(s.clientY-r.top)*(h/r.height)};};
  canvas.onpointerdown=e=>{e.preventDefault();drawing=true;lp=gp(e);};
  canvas.onpointermove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.stroke();lp=p;};
  canvas.onpointerup=canvas.onpointerleave=e=>{e.preventDefault();drawing=false;};
  return{canvas,ctx,clear:()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);}};
}

async function doSheets(btn){
  btn.disabled=true;btn.textContent="⏳ 備份中...";

    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"customers",rows:customers.map(c=>[c.name,c.phone||"",c.balance||0,c.createdAt||""])})});

  const ai=ce("input","input");ai.type="number";ai.placeholder="0";ai.style.cssText="flex:1;font-size:22px;font-weight:800;text-align:center";
  const au=ce("div");au.style.cssText="font-size:20px;color:#ddd";au.textContent="元";ap(ar,ai,au);ac.appendChild(ar);
  const bb=ce("div");bb.style.marginTop="10px";ac.appendChild(bb);

    const a=Number(ai.value)||0;const sb2=document.getElementById("ch-sb");

    if(after<0)bb.innerHTML="<div style='color:#e74c3c;font-weight:700'>⚠️ 餘額不足！差 $"+fmt(Math.abs(after))+"</div>";

let rFilter="all",rSvcSel=null,rRecSel=null,rSrch="",rDate="",rYear="",rMon="",rDel=false;
function renderRecords(){

  dw.innerHTML="<span style='font-size:13px;color:#aaa'>📅</span>";

  di.onchange=e=>{rDate=e.target.value;rYear="";rMon="";goTab("records");};dw.appendChild(di);
  if(rDate){const clr=ce("button");clr.style.cssText="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px";clr.textContent="×";clr.onclick=()=>{rDate="";goTab("records");};dw.appendChild(clr);}
  ap(sr,si,dw);wr.appendChild(sr);
  // month selector
  const mr=ce("div");mr.style.cssText="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap";
  const ml=ce("div");ml.style.cssText="font-size:11px;color:#888;font-weight:700;white-space:nowrap";ml.textContent="📆 月份統計";
  const mw=ce("div");mw.style.cssText="display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap";
  const curY=new Date().getFullYear();
  const ySel=ce("select","select");ySel.style.cssText="flex:1;padding:9px 12px;font-size:13px";
  ySel.innerHTML="<option value=''>年份</option>"+[curY,curY-1,curY-2].map(y=>"<option value='"+y+"'"+(rYear===String(y)?" selected":"")+">"+y+" 年</option>").join("");
  const mSel=ce("select","select");mSel.style.cssText="flex:1;padding:9px 12px;font-size:13px";
  mSel.innerHTML="<option value=''>月份</option>"+Array.from({length:12},(_,i)=>{const m=String(i+1).padStart(2,"0");return"<option value='"+m+"'"+(rMon===m?" selected":"")+">"+(i+1)+" 月</option>";}).join("");
  const applyM=()=>{const y=ySel.value,m=mSel.value;if(y&&m){rYear=y;rMon=m;rDate="";}else if(!y&&!m){rYear="";rMon="";}goTab("records");};
  ySel.onchange=applyM;mSel.onchange=applyM;
  const mclr=ce("button","btn btn-g");mclr.style.cssText="font-size:12px;padding:8px 12px;white-space:nowrap";mclr.textContent="清除";mclr.onclick=()=>{rYear="";rMon="";ySel.value="";mSel.value="";goTab("records");};
  ap(mw,ySel,mSel,mclr);ap(mr,ml,mw);wr.appendChild(mr);
  // month stats
  if(rYear&&rMon){
    const mSvc=serviceRecords.filter(r=>{const d=r.time.match(/(\d{4})\/(\d{2})/);return d&&d[1]===rYear&&d[2]===rMon;});
    const mTop=records.filter(r=>{if(r.type!=="topup")return false;const d=r.time.match(/(\d{4})\/(\d{2})/);return d&&d[1]===rYear&&d[2]===rMon;});
    const mSvcAmt=mSvc.reduce((s,r)=>s+(Number(r.amount)||0),0);
    const mTopAmt=mTop.reduce((s,r)=>s+(r.total||0),0);
    const mCash=mSvc.filter(r=>r.payMethod==="現金").reduce((s,r)=>s+(Number(r.amount)||0),0);

  combined=combined.filter(r=>{
    if(rFilter==="service"&&r._t!=="service")return false;

    row.onclick=()=>{if(isS){rSvcSel=r.id;rRecSel=null;}else{rRecSel=r.id;rSvcSel=null;}rDel=false;goTab("records");};
    wr.appendChild(row);
  });
  return wr;
}

  else{const ns=ce("div","no-sig");ns.innerHTML="<div style='font-size:12px;color:#c4547a;font-weight:700;margin-bottom:5px'>⚠️ 尚未簽名</div><div style='font-size:11px;color:#aaa;margin-bottom:10px'>可補簽名</div>";const sb2=ce("button","btn btn-p");sb2.style.cssText="font-size:13px;padding:9px 22px";sb2.textContent="✍️ 補簽名";sb2.onclick=()=>openSig("補簽名",async sig=>{await saveD("records",{...det,signature:sig});toast("✅ 簽名已補存");goTab("records");});ns.appendChild(sb2);card.appendChild(ns);}
  wr.appendChild(card);
  const restoreMsg=iT?"<div style='font-weight:700;color:#c0392b;margin-bottom:6px'>確定要刪除此筆儲值紀錄？</div><div style='font-size:12px;color:#888;margin-bottom:10px'>⚠️ 將自動從客人餘額扣除 $"+fmt(det.total)+"</div>":"<div style='font-weight:700;color:#c0392b;margin-bottom:6px'>確定要刪除此筆扣款紀錄？</div><div style='font-size:12px;color:#888;margin-bottom:10px'>✅ 將自動把 $"+fmt(det.amount)+" 還回客人餘額</div>";
  mkDelSection(wr,{msg:restoreMsg,fn:async()=>{await deleteRecord(det);rRecSel=null;rDel=false;toast("🗑️ 紀錄已刪除，餘額已還原");goTab("records");}});
  return wr;
}

// ── RENDER ALL ──
function goTab(t){tab=t;renderAll();}
function renderAll(){
  if(!currentUser){renderLogin();return;}
  const root=document.getElementById("root");root.innerHTML="";
  const app=ce("div");app.style.cssText="height:100vh;display:flex;flex-direction:column";
  const hdr=ce("header");
  const logo=ce("div");logo.style.cssText="display:flex;align-items:center;gap:10px";logo.innerHTML="<span style='font-size:26px'>🌸</span><div><div class='logo-title'>沐蜜美學秘境</div><div class='logo-sub'>顧客管理系統</div></div>";
  const right=ce("div");right.style.cssText="display:flex;align-items:center;gap:7px";
  const pill=ce("div","pill");pill.textContent="客人 "+customers.length+" 位";
  const lb=ce("button","logout-btn");lb.textContent="登出";lb.onclick=async()=>await signOut(auth);
  ap(right,pill,lb);ap(hdr,logo,right);app.appendChild(hdr);
  const nav=ce("nav");
  [["home","🏠","首頁"],["customers","👥","客人"],["service","✂️","服務"],["topup","💳","儲值"],["charge","💸","扣款"],["records","📋","紀錄"]].forEach(([key,icon,label])=>{
    const btn=ce("button","nav-btn"+(tab===key?" active":""));
    btn.innerHTML="<span class='nav-icon'>"+icon+"</span><span>"+label+"</span>";
    btn.onclick=()=>{if(key==="service")svcPreCid="";goTab(key);};nav.appendChild(btn);
  });
  app.appendChild(nav);
  const main=ce("main");
  if(tab==="home")main.appendChild(renderHome());
  else if(tab==="customers")main.appendChild(renderCustomers());
  else if(tab==="service")main.appendChild(renderService());
  else if(tab==="topup")main.appendChild(renderTopup());
  else if(tab==="charge")main.appendChild(renderCharge());
  else if(tab==="records")main.appendChild(renderRecords());
  app.appendChild(main);root.appendChild(app);
}
</script>
