const todayISO = () => new Date().toISOString().slice(0,10);
const isoToDisp = iso => { if(!iso)return""; const[y,m,d]=iso.split("-"); return`${y}/${m}/${d}`; };
const timeStr = iso => { const t=new Date().toLocaleTimeString("zh-TW",{hour12:false,hour:"2-digit",minute:"2-digit"}); return`${isoToDisp(iso)} ${t}`; };

// ── State ──
let customers=[], records=[], serviceRecords=[], consentForms=[], currentUser=null, currentTab="home";

// ── Firebase helpers ──
const saveDoc = async (col,data) => { try{ await setDoc(doc(db,col,data.id),data); }catch(e){ toast("⚠️ 儲存失敗："+e.message,"warn"); } };
const delDoc = async (col,id) => { try{ await deleteDoc(doc(db,col,id)); }catch(e){ console.error(e); } };

// Delete all records for a customer and fix balance
async function deleteCustomerAll(c) {
  const cid = c.id;
  // delete service records
  for(const r of serviceRecords.filter(r=>r.customerId===cid)) await delDoc("serviceRecords",r.id);
  // delete topup/charge records
  for(const r of records.filter(r=>r.customerId===cid||r.cid===cid)) await delDoc("records",r.id);
  // delete consent forms
  for(const r of consentForms.filter(r=>r.customerId===cid)) await delDoc("consentForms",r.id);
  // delete customer
  await delDoc("customers",cid);
}

// Delete a record and restore balance
async function deleteRecord(r) {
  const cust = customers.find(c=>c.id===r.customerId||c.id===r.cid);
  if(cust) {
    let newBal = cust.balance||0;
    if(r.type==="topup") newBal = Math.max(0, newBal - (r.total||0));
    else if(r.type==="charge") newBal = newBal + (r.amount||0);
    await saveDoc("customers",{...cust,balance:newBal});
  }
  await delDoc("records",r.id);
}

async function deleteSvcRecord(r) {
  await delDoc("serviceRecords",r.id);
}

  onSnapshot(collection(db,"serviceRecords"),snap=>{serviceRecords=snap.docs.map(d=>d.data()).sort((a,b)=>b.time.localeCompare(a.time));renderAll();});
  onSnapshot(collection(db,"consentForms"),snap=>{consentForms=snap.docs.map(d=>d.data());renderAll();});
}

let toastTimer=null;
function toast(msg,type="ok"){
  const el=document.getElementById("toast-el");if(!el)return;
  el.textContent=msg;el.style.background=type==="warn"?"#e67e22":"#6cc5a0";el.style.display="block";
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display="none";},3000);
}

function doExport(){

async function doSheets(btn){
  btn.disabled=true;btn.textContent="⏳ 備份中...";
  try{
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"customers",rows:customers.map(c=>[c.name,c.phone||"",c.balance||0,c.createdAt||""])})});
    await fetch(SHEETS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"records",rows:serviceRecords.map(r=>[r.time,r.customerName,r.service,r.amount||0,r.payMethod||"",r.notes||""])})});

    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(244,165,176,.2);font-size:12px"><span style="color:#aaa">儲值方案</span><span style="font-weight:700">${plan?.label||"自訂金額"}</span></div>

    ${bonus>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(244,165,176,.2);font-size:12px"><span style="color:#aaa">贈送金額（優惠贈點）</span><span style="font-weight:700;color:#f4a5b0">NT$ ${fmt(bonus)} 元</span></div>`:""}
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:900"><span style="color:#3d2440">入帳總金額</span><span style="color:#6cc5a0">NT$ ${fmt(total)} 元</span></div>
    ${bonus>0?`<div style="background:#fff8e1;border-radius:8px;padding:8px;font-size:11px;color:#b8860b;margin-top:4px">⚠️ 贈送金額 NT$${fmt(bonus)} 元為促銷優惠，不計入退款計算基礎</div>`:""}`;

① 退款金額以實際付款金額扣除已使用服務後之餘額計算
② 退還金額為可退款金額之 80%（扣除 20% 行政處理費）
③ 贈送金額視為已使用，不列入退款計算"},
    {icon:"4",title:"特殊情況退款",content:"因搬遷、重大疾病等不可抗力因素無法繼續使用服務者，可申請：
① 優先辦理轉讓（讓渡予第三人使用）
② 或申請退還未使用付款金額之 80%
③ 退款申請需以書面提出，於 14 個工作日內處理"},
    {icon:"5",title:"契約審閱期",content:"依《消費者保護法》規定，本契約審閱期不得少於三日。消費者如需審閱，可要求攜回後再行簽署，本店不得拒絕。"},
    {icon:"6",title:"個人資料保護",content:"本店依《個人資料保護法》規範，蒐集之個人資料僅供服務聯繫、顧客管理使用，不提供予第三方。"},
    {icon:"7",title:"消費爭議處理",content:"如有消費爭議，消費者得向本縣市消費者保護官申訴，或撥打消費者服務專線 1950。"},

  modal.appendChild(sigTitle);
  const canvas=ce("canvas","sig-canvas");canvas.width=900;canvas.height=240;
  const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,240);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lp=null;
  const gp=e=>{const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(900/r.width),y:(s.clientY-r.top)*(240/r.height)};};
  canvas.onpointerdown=e=>{e.preventDefault();drawing=true;lp=gp(e);};
  canvas.onpointermove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.stroke();lp=p;};

  const bClr=ce("button","btn btn-g");bClr.textContent="清除簽名";bClr.onclick=()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,900,240);};

    const full={id:uid(),type:"topup",cid:cust.id,customerId:cust.id,customerName:cust.name,amount,bonus,total,plan:plan?.label||"自訂",note,cash:cash?Number(cash):null,date,time:timeStr(date),signature:sig,contractSigned:true};

  // Customer
  const lc=ce("div","card");txt(lc.appendChild(ce("div","card-title")),"選擇客人");
  const sel=ce("select","select");sel.innerHTML=`<option value="">— 請選擇客人 —</option>`+customers.map(c=>`<option value="${c.id}">${c.name}（餘額 $${fmt(c.balance||0)}）</option>`).join("");
  sel.value=chCid;sel.onchange=e=>{chCid=e.target.value;goTab("charge");};lc.appendChild(sel);
  const cust=customers.find(c=>c.id===chCid);

  const din=ce("input","input");din.type="date";din.value=chDate;din.onchange=e=>{chDate=e.target.value;};ap(lc,dlbl,din);wrap.appendChild(lc);
  // Service selection

  const tw=ce("div");tw.style.cssText="display:flex;flex-wrap:wrap;margin-bottom:10px";
  SERVICES.forEach(sv=>{
    const tb=ce("button","tag"+(chSvc===sv?" on":""));tb.textContent=sv;
    tb.onclick=()=>{chSvc=sv;const si2=document.getElementById("ch-svc");if(si2)si2.value=sv;tw.querySelectorAll(".tag").forEach(b=>b.classList.remove("on"));tb.classList.add("on");};
    tw.appendChild(tb);
  });
  const svcIn=ce("input","input");svcIn.id="ch-svc";svcIn.placeholder="或自行輸入服務項目";svcIn.value=chSvc;
  svcIn.oninput=e=>{chSvc=e.target.value;tw.querySelectorAll(".tag").forEach(b=>b.classList.remove("on"));};
  ap(sc,tw,svcIn);wrap.appendChild(sc);
  // Amount
  const amtCard=ce("div","card");txt(amtCard.appendChild(ce("div","card-title")),"扣款金額");
  const ar=ce("div");ar.style.cssText="display:flex;gap:8px;align-items:center";
  const ai=ce("input","input");ai.type="number";ai.placeholder="0";ai.style.cssText="flex:1;font-size:22px;font-weight:800;text-align:center";
  const au=ce("div");au.style.cssText="font-size:20px;color:#ddd";au.textContent="元";ap(ar,ai,au);amtCard.appendChild(ar);
  const bb=ce("div");bb.style.marginTop="10px";amtCard.appendChild(bb);
  const updatePrev=()=>{
    const a=Number(ai.value)||0;const sb2=document.getElementById("ch-sb");
    if(!a||!cust){bb.innerHTML="";if(sb2)sb2.disabled=true;return;}
    const after=(cust.balance||0)-a;
    bb.style.cssText=`margin-top:10px;padding:10px;background:${after<0?"#fff0f0":"#f0fff6"};border-radius:9px`;
    if(after<0){bb.innerHTML=`<div style="color:#e74c3c;font-weight:700">⚠️ 餘額不足！差 $${fmt(Math.abs(after))}</div>`;}
    else{bb.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="color:#aaa;font-size:11px">扣款後餘額</div><div style="font-size:20px;font-weight:900;color:${after<LOW?"#e67e22":"#6cc5a0"}">$${fmt(after)}</div></div><div style="font-size:26px">${after<LOW?"⚠️":"✅"}</div></div>`;}
    if(sb2)sb2.disabled=!(cust&&a>0&&(cust.balance||0)>=a);
  };
  ai.oninput=updatePrev;
  const ni=ce("input","input");ni.placeholder="備註（選填）";ni.value=chNote;ni.oninput=e=>{chNote=e.target.value;};ni.style.margin="10px 0 0";amtCard.appendChild(ni);
  const sb=ce("button","btn btn-s");sb.id="ch-sb";sb.style.cssText="width:100%;font-size:16px;padding:14px;margin-top:10px";sb.textContent="💸 確認扣款，前往簽名";sb.disabled=true;

    const finalAmt=Number(ai.value)||0;

    const afterBal=(cust.balance||0)-finalAmt;
    openSig("扣款確認簽名",async sig=>{
      const full={id:uid(),type:"charge",cid:cust.id,customerId:cust.id,customerName:cust.name,service:svcIn.value||chSvc||"儲值扣款",amount:finalAmt,beforeBalance:cust.balance||0,afterBalance:afterBal,note:ni.value,date:chDate,time:timeStr(chDate),signature:sig};
      await saveDoc("customers",{...cust,balance:afterBal});
      await saveDoc("records",full);
      chCid="";chSvc="";chNote="";chDate=todayISO();
      toast("✅ 扣款完成");goTab("home");
    });
  };
  amtCard.appendChild(sb);wrap.appendChild(amtCard);return wrap;
}

// ═══════════ RECORDS ═══════════
let rFilter="all",rSvcSel=null,rRecSel=null,rSearch="",rDate="",rMonth="",rDelConfirm=false;

function renderRecords(){
  const wrap=ce("div");
  if(rSvcSel){const det=serviceRecords.find(r=>r.id===rSvcSel);if(!det){rSvcSel=null;}else return renderSvcDetail(det,wrap);}
  if(rRecSel){const det=records.find(r=>r.id===rRecSel);if(!det){rRecSel=null;}else return renderRecDetail(det,wrap);}

    const fb=ce("button","fb"+(rFilter===k?" on":""));fb.textContent=l;fb.onclick=()=>{rFilter=k;goTab("records");};fr.appendChild(fb);
  });

  const si=ce("input","input");si.placeholder="🔍 搜尋客人姓名";si.value=rSearch;si.style.flex="1";si.oninput=e=>{rSearch=e.target.value;goTab("records");};
  const dw=ce("div");dw.style.cssText="display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #f0e8f4;border-radius:10px;padding:0 9px;flex:1;min-width:140px";
  dw.innerHTML='<span style="font-size:13px;color:#aaa">📅</span>';
  const di=ce("input");di.type="date";di.style.cssText="flex:1;border:none;outline:none;font-size:13px;color:#3d2440;background:transparent;padding:10px 0;font-family:inherit";di.value=rDate;di.onchange=e=>{rDate=e.target.value;rMonth="";goTab("records");};dw.appendChild(di);
  if(rDate){const clr=ce("button");clr.style.cssText="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px";clr.textContent="×";clr.onclick=()=>{rDate="";goTab("records");};dw.appendChild(clr);}
  ap(sr,si,dw);wrap.appendChild(sr);
  // Month - use year+month dropdowns for better iPad compatibility
  const mr=ce("div");mr.style.cssText="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap";
  const mlbl=ce("div");mlbl.style.cssText="font-size:11px;color:#888;font-weight:700;white-space:nowrap";mlbl.textContent="📆 月份統計";
  const mw=ce("div");mw.style.cssText="display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap";
  // Year select
  const ySel=ce("select","select");ySel.style.cssText="flex:1;padding:9px 12px;font-size:13px";
  const curYear=new Date().getFullYear();
  const [selYear,selMon]=rMonth?rMonth.split("-"):["",""];
  ySel.innerHTML=`<option value="">年份</option>`+[curYear,curYear-1,curYear-2].map(y=>`<option value="${y}"${selYear===String(y)?" selected":""}>${y} 年</option>`).join("");
  // Month select
  const mSel=ce("select","select");mSel.style.cssText="flex:1;padding:9px 12px;font-size:13px";
  mSel.innerHTML=`<option value="">月份</option>`+Array.from({length:12},(_,i)=>{const m=String(i+1).padStart(2,"0");return`<option value="${m}"${selMon===m?" selected":""}>${i+1} 月</option>`;}).join("");
  const applyMonth=()=>{
    const y=ySel.value,m=mSel.value;
    if(y&&m){rMonth=`${y}-${m}`;rDate="";goTab("records");}
    else if(!y&&!m){rMonth="";goTab("records");}
  };
  ySel.onchange=applyMonth;mSel.onchange=applyMonth;
  const mclr=ce("button","btn btn-g");mclr.style.cssText="font-size:12px;padding:8px 12px;white-space:nowrap";mclr.textContent="清除";mclr.onclick=()=>{rMonth="";ySel.value="";mSel.value="";goTab("records");};
  ap(mw,ySel,mSel,mclr);ap(mr,mlbl,mw);wrap.appendChild(mr);
  // Month stats
  if(rMonth){
    const [my,mm]=rMonth.split("-");
    const mSvc=serviceRecords.filter(r=>{const d=r.time.match(/(\d{4})\/(\d{2})/);return d&&d[1]===my&&d[2]===mm;});
    const mTop=records.filter(r=>r.type==="topup"&&(()=>{const d=r.time.match(/(\d{4})\/(\d{2})/);return d&&d[1]===my&&d[2]===mm;})());
    const mSvcAmt=mSvc.reduce((s,r)=>s+(Number(r.amount)||0),0);
    const mTopAmt=mTop.reduce((s,r)=>s+(r.total||0),0);
    const mCash=mSvc.filter(r=>r.payMethod==="現金").reduce((s,r)=>s+(Number(r.amount)||0),0);
    const ms=ce("div","card");ms.style.cssText="background:linear-gradient(135deg,#fdf0f5,#f0f8ff);padding:13px;margin-bottom:10px";
    ms.innerHTML=`<div style="font-size:12px;font-weight:800;color:#3d2440;margin-bottom:9px">📊 ${my} 年 ${mm} 月統計</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px"><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px"><div style="font-size:10px;color:#aaa;margin-bottom:2px">✂️ 服務金額</div><div style="font-weight:900;color:#6a3aa5;font-size:14px">$${fmt(mSvcAmt)}</div><div style="font-size:10px;color:#ccc">${mSvc.length} 筆</div></div><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px"><div style="font-size:10px;color:#aaa;margin-bottom:2px">💳 儲值金額</div><div style="font-weight:900;color:#f4a5b0;font-size:14px">$${fmt(mTopAmt)}</div><div style="font-size:10px;color:#ccc">${mTop.length} 筆</div></div><div style="text-align:center;background:rgba(255,255,255,.85);border-radius:9px;padding:9px 3px"><div style="font-size:10px;color:#aaa;margin-bottom:2px">💵 收現金額</div><div style="font-weight:900;color:#2e7d52;font-size:14px">$${fmt(mCash)}</div><div style="font-size:10px;color:#ccc">現金 ${mSvc.filter(r=>r.payMethod==="現金").length} 筆</div></div></div>`;
    wrap.appendChild(ms);
  }
  if(rDate){const lbl=ce("div");lbl.style.cssText="font-size:12px;color:#f4a5b0;margin-bottom:9px;font-weight:600";lbl.textContent="📅 "+isoToDisp(rDate)+" 的紀錄";wrap.appendChild(lbl);}
  // Combine all records
  const allSvc=serviceRecords.map(r=>({...r,_type:"service"}));
  const allRec=records.map(r=>({...r,_type:r.type}));
  let combined=[...allSvc,...allRec].sort((a,b)=>b.time.localeCompare(a.time));
  combined=combined.filter(r=>{
    if(rFilter==="service"&&r._type!=="service")return false;
    if(rFilter==="topup"&&r._type!=="topup")return false;
    if(rFilter==="charge"&&r._type!=="charge")return false;
    if(rSearch&&!r.customerName.includes(rSearch))return false;
    if(rDate&&!r.time.startsWith(isoToDisp(rDate)))return false;
    if(rMonth){const[my,mm]=rMonth.split("-");const d=r.time.match(/(\d{4})\/(\d{2})/);if(!d||d[1]!==my||d[2]!==mm)return false;}
    return true;
  });
  if(!combined.length){const e=ce("div","empty");e.textContent="尚無符合紀錄";wrap.appendChild(e);}
  combined.forEach(r=>{
    const row=ce("div","row-item");
    const isS=r._type==="service",iT=r._type==="topup";
    row.innerHTML=`<span style="font-size:22px">${isS?"✂️":iT?"💳":"💸"}</span><div style="flex:1"><div style="font-weight:700;font-size:14px">${r.customerName}</div><div style="font-size:11px;color:#aaa">${isS?r.service:iT?(r.plan||"儲值"):(r.service||"扣款")} · ${r.time}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:14px;color:${isS?"#6a3aa5":iT?"#6cc5a0":"#f4a5b0"}">${isS?"$"+fmt(r.amount):iT?"+$"+fmt(r.total):"-$"+fmt(r.amount)}</div>${r.signature?'<div style="font-size:10px;color:#ccc">✍️ 已簽</div>':'<div style="font-size:10px;color:#f4a5b0;font-weight:700">⚠️ 未簽</div>'}</div>`;
    row.onclick=()=>{
      if(isS){rSvcSel=r.id;rRecSel=null;}
      else{rRecSel=r.id;rSvcSel=null;}
      rDelConfirm=false;goTab("records");
    };
    wrap.appendChild(row);
  });
  return wrap;
}

function renderSvcDetail(det,wrap){

  // Delete
  if(rDelConfirm){
    const cb=ce("div","confirm-box");cb.innerHTML='<div style="font-weight:700;color:#c0392b;margin-bottom:6px">確定要刪除此筆紀錄？</div><div style="font-size:12px;color:#888;margin-bottom:10px">服務紀錄刪除後無法復原</div>';
    const ca=ce("div");ca.style.cssText="display:flex;gap:8px;justify-content:center";
    const cNo=ce("button","btn btn-g");cNo.textContent="取消";cNo.onclick=()=>{rDelConfirm=false;goTab("records");};
    const cYes=ce("button","btn");cYes.style.cssText="background:#e74c3c;color:#fff";cYes.textContent="確認刪除";
    cYes.onclick=async()=>{cYes.disabled=true;cYes.textContent="刪除中...";await deleteSvcRecord(det);rSvcSel=null;rDelConfirm=false;toast("🗑️ 服務紀錄已刪除");goTab("records");};
    ap(ca,cNo,cYes);cb.appendChild(ca);card.appendChild(cb);
  } else {
    const db2=ce("button","btn btn-red");db2.style.cssText="width:100%;margin-top:10px;font-size:13px";db2.textContent="🗑️ 刪除此筆紀錄";db2.onclick=()=>{rDelConfirm=true;goTab("records");};card.appendChild(db2);
  }
  wrap.appendChild(card);return wrap;
}

function renderRecDetail(det,wrap){
  const isTopup=det.type==="topup";
  const back=ce("button","back-btn");back.textContent="← 返回";back.onclick=()=>{rRecSel=null;goTab("records");};
  const hdr=ce("div");hdr.style.cssText="display:flex;align-items:center;gap:9px;margin-bottom:12px";
  const ht=ce("span");ht.style.cssText="font-size:16px;font-weight:800;color:#3d2440;flex:1";ht.textContent=isTopup?"💳 儲值紀錄詳情":"💸 扣款紀錄詳情";
  ap(hdr,back,ht);wrap.appendChild(hdr);
  const card=ce("div","card");
  card.innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0e8f4"><span style="font-size:26px">${isTopup?"💳":"💸"}</span><div style="flex:1"><div style="font-weight:800;font-size:16px">${det.customerName}</div><div style="color:#aaa;font-size:11px">${det.time}</div></div><div style="font-weight:900;font-size:18px;color:${isTopup?"#6cc5a0":"#f4a5b0"}">${isTopup?"+$"+fmt(det.total):"-$"+fmt(det.amount)}</div></div>`;
  const ig=ce("div");ig.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px";
  const ic=(l,v)=>{const d=ce("div","ic");d.innerHTML=`<div class="ic-l">${l}</div><div class="ic-v">${v}</div>`;return d;};
  ig.appendChild(ic("類型",isTopup?"儲值":"扣款"));
  if(isTopup){ap(ig,ic("方案",det.plan||""),ic("入帳金額","$"+fmt(det.total)));if(det.bonus>0)ig.appendChild(ic("贈點","$"+fmt(det.bonus)));}
  else{ap(ig,ic("服務項目",det.service||""),ic("扣款金額","$"+fmt(det.amount)));if(det.beforeBalance!==undefined)ig.appendChild(ic("扣款前餘額","$"+fmt(det.beforeBalance)));if(det.afterBalance!==undefined)ig.appendChild(ic("扣款後餘額","$"+fmt(det.afterBalance)));}
  if(det.note)ig.appendChild(ic("備註",det.note));
  card.appendChild(ig);
  if(det.signature){const sd=ce("div");sd.style.marginBottom="12px";sd.innerHTML='<div style="font-weight:700;color:#aaa;font-size:12px;margin-bottom:7px">✍️ 客人簽名存證</div>';const si=ce("img");si.src=det.signature;si.style.cssText="width:100%;border-radius:9px;border:1.5px solid #eee";sd.appendChild(si);card.appendChild(sd);}
  else{const ns=ce("div","no-sig");ns.innerHTML='<div style="font-size:12px;color:#c4547a;font-weight:700;margin-bottom:5px">⚠️ 尚未簽名</div><div style="font-size:11px;color:#aaa;margin-bottom:10px">可補簽名</div>';const sb2=ce("button","btn btn-p");sb2.style.cssText="font-size:13px;padding:9px 22px";sb2.textContent="✍️ 補簽名";sb2.onclick=()=>openSig("補簽名",async sig=>{await saveDoc("records",{...det,signature:sig});toast("✅ 簽名已補存");goTab("records");});ns.appendChild(sb2);card.appendChild(ns);}
  // Delete with balance restore
  if(rDelConfirm){
    const restoreMsg=isTopup?`⚠️ 刪除後將自動從客人餘額扣除 $${fmt(det.total)}`:`✅ 刪除後將自動把 $${fmt(det.amount)} 還回客人餘額`;
    const cb=ce("div","confirm-box");cb.innerHTML=`<div style="font-weight:700;color:#c0392b;margin-bottom:6px">確定要刪除此筆紀錄？</div><div style="font-size:12px;color:#888;margin-bottom:10px">${restoreMsg}</div>`;
    const ca=ce("div");ca.style.cssText="display:flex;gap:8px;justify-content:center";
    const cNo=ce("button","btn btn-g");cNo.textContent="取消";cNo.onclick=()=>{rDelConfirm=false;goTab("records");};
    const cYes=ce("button","btn");cYes.style.cssText="background:#e74c3c;color:#fff";cYes.textContent="確認刪除";
    cYes.onclick=async()=>{
      cYes.disabled=true;cYes.textContent="刪除中...";
      await deleteRecord(det);
      rRecSel=null;rDelConfirm=false;toast("🗑️ 紀錄已刪除，餘額已還原");goTab("records");
    };
    ap(ca,cNo,cYes);cb.appendChild(ca);card.appendChild(cb);
  } else {
    const db2=ce("button","btn btn-red");db2.style.cssText="width:100%;margin-top:10px;font-size:13px";db2.textContent="🗑️ 刪除此筆紀錄";db2.onclick=()=>{rDelConfirm=true;goTab("records");};card.appendChild(db2);
  }
  wrap.appendChild(card);return wrap;
}

// ═══════════ RENDER ALL ═══════════
function goTab(tab){currentTab=tab;renderAll();}

function renderAll(){
  if(!currentUser){renderLogin();return;}
  const root=document.getElementById("root");root.innerHTML="";
  const appDiv=ce("div");appDiv.style.cssText="height:100vh;display:flex;flex-direction:column";
  // Header
  const hdr=ce("header");
  const logo=ce("div");logo.style.cssText="display:flex;align-items:center;gap:10px";logo.innerHTML='<span style="font-size:26px">🌸</span><div><div class="logo-title">沐蜜美學秘境</div><div class="logo-sub">顧客管理系統</div></div>';
  const right=ce("div");right.style.cssText="display:flex;align-items:center;gap:7px";
  const pill=ce("div","pill");pill.textContent="客人 "+customers.length+" 位";
  const logoutBtn=ce("button","logout-btn");logoutBtn.textContent="登出";logoutBtn.onclick=async()=>await signOut(auth);
  ap(right,pill,logoutBtn);ap(hdr,logo,right);appDiv.appendChild(hdr);
  // Nav
  const nav=ce("nav");
  [["home","🏠","首頁"],["customers","👥","客人"],["service","✂️","服務"],["topup","💳","儲值"],["charge","💸","扣款"],["records","📋","紀錄"]].forEach(([key,icon,label])=>{
    const btn=ce("button","nav-btn"+(currentTab===key?" active":""));
    btn.innerHTML=`<span class="nav-icon">${icon}</span><span>${label}</span>`;
    btn.onclick=()=>{if(key==="service")svcPreCid="";goTab(key);};nav.appendChild(btn);
  });
  appDiv.appendChild(nav);
  // Main
  const main=ce("main");
  if(currentTab==="home")main.appendChild(renderHome());
  else if(currentTab==="customers")main.appendChild(renderCustomers());
  else if(currentTab==="service")main.appendChild(renderService());
  else if(currentTab==="topup")main.appendChild(renderTopup());
  else if(currentTab==="charge")main.appendChild(renderCharge());
  else if(currentTab==="records")main.appendChild(renderRecords());
  appDiv.appendChild(main);root.appendChild(appDiv);
}
</script>
